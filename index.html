<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#C0001D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MMFSL Sales Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:-webkit-fill-available;}
body{position:fixed;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#ECE5DD;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#ECE5DD;padding-top:env(safe-area-inset-top,0px);}
#hdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.hav{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.hname{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{font-size:11px;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:3px;margin-top:1px;}
.odot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.hbtn{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn:active{background:rgba(255,255,255,.18);}
#msgs{flex:1 1 0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 8px 6px;}
#msgs::-webkit-scrollbar{display:none;}
.dc{text-align:center;margin:4px 0 8px;}
.dc span{font-size:11.5px;color:#555;background:rgba(255,255,255,.88);padding:3px 12px;border-radius:7px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.row{display:flex;align-items:flex-end;gap:4px;margin-bottom:3px;}
.row.me{flex-direction:row-reverse;}
.bav{width:26px;height:26px;border-radius:50%;background:#C0001D;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;}
.bbl{max-width:82%;padding:8px 11px 5px;font-size:14.5px;line-height:1.5;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.bbl.me{background:#C0001D;color:#fff;border-radius:8px 2px 8px 8px;animation:pop .15s ease-out;}
.bbl.bot{background:#fff;color:#111;border-radius:2px 8px 8px 8px;animation:pop .15s ease-out;}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(4px);}to{opacity:1;transform:none;}}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px;}
.bt{font-size:10px;opacity:.5;white-space:nowrap;}
.bbl.me .bt{color:rgba(255,255,255,.8);}
.bbl.bot .bt{color:#666;}
.wcard{text-align:center;padding:18px 8px 12px;}
.wico{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;}
.wtit{font-size:15px;font-weight:700;color:#1a1a1a;}
.wsub{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}
.trow{display:flex;align-items:flex-end;gap:4px;margin-bottom:4px;}
.tbbl{background:#fff;border-radius:2px 8px 8px 8px;padding:10px 14px;display:flex;gap:4px;align-items:center;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.dot{width:7px;height:7px;border-radius:50%;background:#C0001D;}
.dot:nth-child(1){animation:bnc 1.2s 0s infinite;}
.dot:nth-child(2){animation:bnc 1.2s .18s infinite;}
.dot:nth-child(3){animation:bnc 1.2s .36s infinite;}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.3;}30%{transform:translateY(-6px);opacity:1;}}
#sugs{flex:0 0 auto;display:flex;gap:6px;overflow-x:auto;padding:5px 8px;background:#ECE5DD;border-top:1px solid rgba(0,0,0,.07);}
#sugs::-webkit-scrollbar{display:none;}
.sg{white-space:nowrap;padding:5px 12px;border-radius:18px;border:1.5px solid #C0001D;background:#fff;color:#C0001D;font-size:12.5px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:inherit;}
.sg:active{background:#C0001D;color:#fff;}
#ibar{flex:0 0 auto;background:#F0F0F0;border-top:1px solid #d0d0d0;display:flex;align-items:flex-end;gap:6px;padding:7px 8px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));}
#txta{flex:1;min-height:40px;max-height:92px;padding:9px 13px;border-radius:20px;border:none;outline:none;background:#fff;font-size:16px;font-family:inherit;line-height:1.4;color:#111;resize:none;overflow-y:auto;box-shadow:0 1px 2px rgba(0,0,0,.1);-webkit-appearance:none;}
#txta::placeholder{color:#aaa;}
.ibtn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;}
#micbtn{background:#fff;color:#555;box-shadow:0 1px 2px rgba(0,0,0,.12);}
#micbtn.rec{background:#C0001D;color:#fff;}
#sndbtn{background:#C0001D;color:#fff;box-shadow:0 2px 5px rgba(192,0,29,.4);}
#sndbtn:active{background:#8B0015;}
/* SIDE SCREENS */
.sscr{position:fixed;inset:0;max-width:480px;margin:0 auto;display:flex;flex-direction:column;background:#fff;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;padding-top:env(safe-area-inset-top,0px);}
.sscr.open{transform:none;}
.shdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.sbk{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* LOGIN */
.lbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:18px;}
.llogo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:28px;}
.ltit{font-size:20px;font-weight:700;color:#111;text-align:center;}
.lsub{font-size:13px;color:#888;text-align:center;}
.lform{width:100%;display:flex;flex-direction:column;gap:12px;}
.flbl{font-size:12px;font-weight:600;color:#555;margin-bottom:3px;}
.finp{width:100%;padding:13px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.finp:focus{border-color:#C0001D;background:#fff;}
.lerr{font-size:12.5px;color:#C0001D;text-align:center;display:none;}
.lblogin{width:100%;padding:14px;background:#C0001D;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;}
.lblogin:active{background:#8B0015;}
/* ADMIN */
#adm-scr{background:#f2f2f2;}
#tabs{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 5px;border:none;background:none;color:#bbb;font-family:inherit;cursor:pointer;font-size:9.5px;font-weight:500;}
.tabi{font-size:17px;line-height:1;}
.tab.on{color:#C0001D;}
#abody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;}
#abody::-webkit-scrollbar{display:none;}
/* PRODUCT SECTIONS */
.psec{margin-bottom:10px;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.psec-hdr{display:flex;align-items:center;padding:11px 13px;cursor:pointer;user-select:none;}
.psec-hdr-lbl{font-size:13px;font-weight:700;color:#fff;flex:1;}
.psec-arr{color:rgba(255,255,255,.8);font-size:14px;margin-left:8px;transition:transform .2s;}
.psec-arr.open{transform:rotate(180deg);}
.psec-body{background:#fafafa;border-top:1px solid rgba(0,0,0,.08);display:none;}
/* CUSTOMER TYPE TABS */
.ctype-tabs{display:flex;border-bottom:1px solid #e5e5e5;background:#fff;}
.ctype-tab{flex:1;padding:10px 4px;font-size:12.5px;font-weight:600;color:#aaa;border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;}
.ctype-tab.on{color:#C0001D;border-bottom-color:#C0001D;}
/* PITCH CARD */
.pitch-card{padding:12px;}
.pitch-lbl{font-size:12px;font-weight:600;color:#555;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.pitch-txt{width:100%;min-height:100px;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:#111;resize:vertical;outline:none;-webkit-appearance:none;line-height:1.5;}
.pitch-txt:focus{border-color:#C0001D;}
.pitch-txt.empty{border-style:dashed;background:#fafafa;}
.pitch-hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.5;}
.save-row{display:flex;gap:8px;margin-top:8px;}
.btn-save-pitch{flex:1;background:#C0001D;color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-save-pitch:active{background:#8B0015;}
.btn-save-pitch:disabled{opacity:.6;}
.saved-badge{font-size:11px;color:#059669;font-weight:600;display:none;align-items:center;gap:4px;}
/* UPDATES SECTION */
.upd-item{background:#fff;border-radius:8px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.upd-title{font-size:13px;font-weight:600;color:#222;}
.upd-body{font-size:12px;color:#666;margin-top:3px;line-height:1.5;}
.upd-meta{font-size:10.5px;color:#bbb;margin-top:5px;}
/* FORMS */
.card{background:#fff;border-radius:12px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:10px;}
.ctit{font-size:13px;font-weight:700;color:#222;margin-bottom:10px;}
.aform{display:flex;flex-direction:column;gap:10px;}
.ainp,.atxt{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.ainp:focus,.atxt:focus{border-color:#C0001D;background:#fff;}
.atxt{min-height:80px;resize:vertical;}
.bsub{background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;}
.bsub:active{background:#8B0015;}
.bsub:disabled{opacity:.65;}
.bgray{background:#555;}
.info{border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;margin-bottom:8px;}
.igreen{background:#ecfdf5;color:#065f46;}
.ver{font-size:10.5px;color:#ccc;text-align:center;padding:8px;font-family:monospace;}
/* MODAL */
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#mbg.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.mbtns{display:flex;gap:10px;margin-top:14px;}
.bcancel{flex:1;background:#f0f0f0;color:#444;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.bdo{flex:1;background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(20,20,20,.9);color:#fff;padding:8px 16px;border-radius:18px;font-size:12.5px;font-weight:500;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;transition:transform .22s,opacity .22s;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<!-- CHAT -->
<div id="app">
  <div id="hdr">
    <div class="hav">&#x1F916;</div>
    <div class="hinfo">
      <div class="hname">MMFSL Sales Assistant</div>
      <div class="hsub"><span class="odot"></span>Online &middot; Mahindra Finance</div>
    </div>
    <button class="hbtn" onclick="openAdmin()">&#x2699;&#xFE0F;</button>
    <button class="hbtn" onclick="clearChat()">&#x1F5D1;&#xFE0F;</button>
  </div>
  <div id="msgs">
    <div class="wcard">
      <div class="wico">&#x1F3E6;</div>
      <div class="wtit">MMFSL Sales Assistant</div>
      <div class="wsub">Insurance, Loans, Objections &mdash; Hindi mein.<br>Poochho kuch bhi! &#x1F4BC;</div>
    </div>
    <div class="dc"><span id="dlbl">Aaj</span></div>
  </div>
  <div id="sugs">
    <button class="sg" onclick="useSug(this)">Insurance pitch</button>
    <button class="sg" onclick="useSug(this)">Tractor loan pitch</button>
    <button class="sg" onclick="useSug(this)">Rate objection</button>
    <button class="sg" onclick="useSug(this)">Documents</button>
    <button class="sg" onclick="useSug(this)">Deal close</button>
  </div>
  <div id="ibar">
    <button class="ibtn" id="micbtn" onclick="toggleMic()">&#x1F399;&#xFE0F;</button>
    <textarea id="txta" placeholder="Kuch bhi poochho&#x2026;" rows="1" oninput="grow(this)" onkeydown="onKey(event)"></textarea>
    <button class="ibtn" id="sndbtn" onclick="doSend()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<!-- LOGIN -->
<div class="sscr" id="lscr">
  <div class="shdr">
    <button class="sbk" onclick="close_('lscr')">&#x2039;</button>
    <div class="hav">&#x1F512;</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Login</div></div>
  </div>
  <div class="lbody">
    <div class="llogo">&#x1F512;</div>
    <div><div class="ltit">Admin Panel</div><div class="lsub" style="margin-top:4px;">Knowledge base manage karo</div></div>
    <div class="lform">
      <div><div class="flbl">Username</div><input class="finp" id="lu" type="text" placeholder="Username" autocomplete="username"></div>
      <div><div class="flbl">Password</div><input class="finp" id="lp" type="password" placeholder="Password" autocomplete="current-password"></div>
      <div class="lerr" id="lerr">Username ya password galat hai &#x26A0;</div>
      <button class="lblogin" onclick="doLogin()">Login karein &#x2192;</button>
    </div>
  </div>
</div>
<!-- ADMIN -->
<div class="sscr" id="ascr" style="background:#f2f2f2;">
  <div class="shdr">
    <button class="sbk" onclick="close_('ascr')">&#x2039;</button>
    <div class="hav">&#x1F4DA;</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Panel</div></div>
    <button class="hbtn" onclick="doLogout()">&#x1F6AA;</button>
  </div>
  <div id="tabs">
    <button class="tab on" id="tins"  onclick="st('ins')"><div class="tabi">&#x1F6E1;&#xFE0F;</div>Insurance</button>
    <button class="tab"    id="tln"   onclick="st('ln')"><div class="tabi">&#x1F4B0;</div>Loans</button>
    <button class="tab"    id="tobj"  onclick="st('obj')"><div class="tabi">&#x26A1;</div>Objections</button>
    <button class="tab"    id="tupd"  onclick="st('upd')"><div class="tabi">&#x1F4E2;</div>Updates</button>
    <button class="tab"    id="tset"  onclick="st('set')"><div class="tabi">&#x2699;&#xFE0F;</div>Settings</button>
  </div>
  <div id="abody"></div>
</div>
<!-- MODAL -->
<div id="mbg" onclick="if(event.target===this)closeMod()">
  <div class="modal">
    <div id="mbody"></div>
    <div class="mbtns">
      <button class="bcancel" onclick="closeMod()">Cancel</button>
      <button class="bdo" id="mdo" onclick="modalDo()">OK</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════════════
   DATA STRUCTURE
   
   Everything is stored in a single structured object:
   DB = {
     pitches: {
       insurance: {
         car:       { new: "...", existing: "..." },
         tractor:   { new: "...", existing: "..." },
         truck:     { new: "...", existing: "..." },
         rickshaw:  { new: "...", existing: "..." },
         bus:       { new: "...", existing: "..." },
         bike:      { new: "...", existing: "..." },
         life:      { new: "...", existing: "..." },
       },
       loans: {
         car:       { new: "...", existing: "..." },
         tractor:   { new: "...", existing: "..." },
         truck:     { new: "...", existing: "..." },
         preowned:  { new: "...", existing: "..." },
         home:      { new: "...", existing: "..." },
         sme:       { new: "...", existing: "..." },
         personal:  { new: "...", existing: "..." },
         fd:        { new: "...", existing: "..." },
       }
     },
     objections: {
       rate:    "...",
       trust:   "...",
       budget:  "...",
       delay:   "...",
       bank:    "...",
       other:   "..."
     },
     updates: [ {id, title, body, ts} ]
   }
══════════════════════════════════════════════════════ */

const GAS = 'https://script.google.com/macros/s/AKfycbwOSqWxWBje8ESVZ9SAjybltMGMJxrQX1IqNqi0xNvwVaTDyBjaHcyQ13AsSvi-ROX1Sw/exec';

const DEFAULT_DB = {
  pitches: {
    insurance: {
      car:      { new: 'Car Insurance pitch (Naya Customer):\n\n"Bhaiya, gadi toh le li — lekin ek accident mein sab kuch jaata hai. MMFSL car insurance mein zero depreciation cover, cashless repair, 24/7 claim support."\n\n"Loan bhi hamare paas, insurance bhi hamare paas — ek hi jagah sab."\n\nClose: "RC do — 10 minute mein cover ho jaata hai."', existing: 'Car Insurance pitch (Existing Customer):\n\n"Bhaiya, aapne MMFSL se gadi li — ab insurance bhi hamare paas rakho. Claim ke waqt ek hi jagah se help milegi."\n\n"Zero dep cover mein full repair milti hai — pocket se kuch nahi."\n\nClose: "RC number do — loan ke saath bundled rate milti hai."'   },
      tractor:  { new: 'Tractor Insurance pitch (Naya Customer):\n\n"Bhaiya, tractor nahi chala toh fasal nahi hogi. Ek chot mein 2-3 mahine bandh — tab kya karoge?"\n\nEngine damage, accident, theft sab cover. Harvest season mein claim fast track.\n\nClose: "Tractor number do — aaj hi cover, EMI mein add ho jaata hai."', existing: 'Tractor Insurance pitch (Existing Customer):\n\n"Bhaiya, loan hamare paas hai — insurance bhi lo. Ek hi number pe sab."\n\n"Loan ki EMI ke saath insurance add karte hain — alag se kuch nahi karna."\n\nClose: "Tractor number do — 15 minute mein ho jaata hai."'  },
      truck:    { new: 'Commercial Vehicle Insurance (Naya Customer):\n\n"Bhai, truck/tempo ek din bandh hua toh income band. Third party compulsory hai — lekin MMFSL mein comprehensive lo: accident, theft, driver injury sab."\n\nClose: "RC aur permit number do — abhi quote nikalta hoon."', existing: 'Commercial Vehicle Insurance (Existing Customer):\n\n"Bhai, loan hamare paas hai — insurance bhi hamare paas lo. Claim ke waqt ek hi jagah se help milegi."\n\nClose: "RC number batao — bundled rate milti hai."'  },
      rickshaw: { new: 'Rickshaw Insurance (Naya Customer):\n\n"Bhaiya, rickshaw se roz ki roti chalti hai — ek accident mein gaadi band toh income band. Third party + own damage cover lo."\n\nE-Rickshaw ke liye battery damage bhi cover.\n\nClose: "Registration number do — aaj hi policy, kal se tension nahi."', existing: 'Rickshaw Insurance (Existing Customer):\n\n"Bhai, loan hamare paas hai — insurance bhi lo. EMI mein add karte hain — alag se kuch nahi."\n\nClose: "RC number do — 10 minute mein."'   },
      bus:      { new: 'Passenger Vehicle Insurance (Naya Customer):\n\n"Bhai, bus/taxi mein passengers hain — unka risk bhi aap pe. Passenger liability cover bhi milta hai saath mein."\n\nClose: "Permit number aur RC do — sahi plan batata hoon."', existing: 'Passenger Vehicle Insurance (Existing Customer):\n\n"Bhai, commercial loan hamare paas hai — insurance bhi lo. Passenger liability cover zaroori hai."\n\nClose: "RC number batao — abhi quote."'  },
      bike:     { new: 'Two-Wheeler Insurance (Naya Customer):\n\n"Bhaiya, bike ka insurance compulsory hai — bina insurance pakde toh fine, accident mein pocket se bhi. Comprehensive cover lo."\n\nClose: "RC number do — 5 minute mein policy."  ', existing: 'Two-Wheeler Insurance (Existing Customer):\n\n"Bhai, loan hamare paas hai — insurance bhi lo. EMI mein add karte hain."\n\nClose: "RC number batao — abhi ho jaata hai."'    },
      life:     { new: 'Life Insurance HDFC (Naya Customer):\n\n"Bhaiya, loan toh le liya — lekin agar kuch ho gaya toh ghar waale EMI kahan se bharenge? MMFSL mein HDFC Life ka term plan milta hai — Rs.500/month mein Rs.50 lakh ka cover."\n\nClose: "Loan document saath hai? Life cover bhi add ho jaata hai — alag kuch nahi karna."', existing: 'Life Insurance HDFC (Existing Customer):\n\n"Bhaiya, MMFSL ne aapka kaam aasan kiya — ek aur kaam karein. HDFC Life ka term plan add karo. Agar kuch hua toh loan bhi maaf, family ko paise bhi."\n\nYeh loan protection ke roop mein pitch karo.\n\nClose: "Loan ke saath term plan add karte hain — ek hi jagah sab."'      }

/* ══ STORAGE ══ */
function getDB(){
  try{
    const r = localStorage.getItem('mf6_db');
    if(!r) return JSON.parse(JSON.stringify(DEFAULT_DB));
    const d = JSON.parse(r);
    // ensure structure is complete
    if(!d.pitches) d.pitches = DEFAULT_DB.pitches;
    if(!d.pitches.insurance) d.pitches.insurance = DEFAULT_DB.pitches.insurance;
    if(!d.pitches.loans) d.pitches.loans = DEFAULT_DB.pitches.loans;
    if(!d.objections) d.objections = DEFAULT_DB.objections;
    if(!d.updates) d.updates = [];
    return d;
  } catch{ return JSON.parse(JSON.stringify(DEFAULT_DB)); }
}
function saveDB(db){ try{ localStorage.setItem('mf6_db', JSON.stringify(db)); }catch{} }
function getCfg(){ return JSON.parse(localStorage.getItem('mf6_cfg')||'{"user":"admin","pass":"mmfs2024"}'); }
function saveCfg(c){ localStorage.setItem('mf6_cfg', JSON.stringify(c)); }

/* ══ CLOUD SYNC ══ */
function syncDown(){
  fetch(GAS+'?action=read', {signal:AbortSignal.timeout(8000)})
    .then(r=>r.ok?r.json():null)
    .then(d=>{ if(d&&d.db) saveDB(d.db); })
    .catch(()=>{});
}
async function pushUp(){
  try{
    const r = await fetch(GAS, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action:'write', data:{db:getDB(), v:Date.now()}}),
      signal: AbortSignal.timeout(10000)
    });
    return r.ok;
  }catch{ return false; }
}

/* ══ CONVERSATION STATE ══ */
let _st = {step:null, product:null, section:null};

function resetState(){ _st = {step:null, product:null, section:null, lastKey:null, variantIdx:{}}; }

/* ══ CHAT ENGINE ══ */
function getVariants(key, db){
  // key format: "insurance_car_new" or "loans_tractor_existing" or "objections_rate"
  const parts = key.split('_');
  let raw = '';
  if(parts[0] === 'objections'){
    raw = (db.objections || {})[parts[1]] || '';
  } else {
    // section = parts[0], product = parts[1], ct = parts[2]
    raw = ((db.pitches || {})[parts[0]] || {})[parts[1]]?.[parts[2]] || '';
  }
  if(!raw.trim()) return [];
  return raw.split(/\n---\n|\n-{3,}\n/).filter(s => s.trim().length > 0);
}

function respond(input){
  const lo = input.toLowerCase().trim();
  const db = getDB();

  // TRY AGAIN — show next variant
  if(lo.includes('try again') || lo.includes('aur ek') || lo.includes('dobara') || lo.includes('different') || lo.includes('alag') || lo === 'next'){
    if(_st.lastKey){
      const parts = getVariants(_st.lastKey, db);
      if(parts.length > 1){
        if(!_st.variantIdx) _st.variantIdx = {};
        const cur = _st.variantIdx[_st.lastKey] || 0;
        const next = (cur + 1) % parts.length;
        _st.variantIdx[_st.lastKey] = next;
        return {a: parts[next].trim() + '\n\n_(' + (next+1) + '/' + parts.length + ' variants)_', chips: ['Try again', 'Aur ek chahiye', ...defaultChips().slice(0,3)]};
      }
      return {a: 'Sirf ek hi variant hai abhi. Admin mein jao aur --- se alag karke zyada variants add karo.', chips: defaultChips()};
    }
    return {a: 'Pehle koi pitch maango — phir "try again" bolo.', chips: defaultChips()};
  }

  // If waiting for a follow-up answer
  if(_st.step === 'wait_custtype'){
    const isExisting = lo.includes('existing') || lo.includes('purana') || lo.includes('2') || lo.includes('pehle');
    const ct = isExisting ? 'existing' : 'new';
    const section = _st.section;
    const product = _st.product;
    resetState();
    const key = section + '_' + product + '_' + ct;
    const parts = getVariants(key, db);
    if(parts.length){
      if(!_st.variantIdx) _st.variantIdx = {};
      // Reset index for fresh request
      _st.variantIdx[key] = 0;
      _st.lastKey = key;
      const txt = parts[0].trim();
      const suffix = parts.length > 1 ? '\n\n_(1/' + parts.length + ' variants — "try again" bolo aur dekhne ke liye)_' : '';
      return {a: txt + suffix, chips: parts.length > 1 ? ['Try again', 'Aur ek chahiye', ...defaultChips().slice(0,3)] : defaultChips()};
    }
    return {a: 'Yeh pitch abhi set nahi hai. Admin mein jao aur fill karo.', chips: defaultChips()};
  }

  if(_st.step === 'wait_ins_product'){
    const v = detectVehicle(lo);
    if(!v) return {a:'Vehicle type batao — Car, Tractor, Truck, Rickshaw, Bus, Bike, ya Life Insurance?', chips:['Car','Tractor','Truck','Rickshaw','Bus/Taxi','Two-Wheeler','Life Insurance']};
    _st.product = v;
    _st.step = 'wait_custtype';
    return {a:'Customer kaisa hai?\n\n1. Naya Customer (pehli baar)\n2. Existing Customer (pehle se MMFSL se loan le chuka hai)', chips:['Naya Customer','Existing Customer']};
  }

  if(_st.step === 'wait_loan_product'){
    const v = detectLoan(lo);
    if(!v) return {a:'Kaunsa loan — Car, Tractor, Truck, Pre-Owned, Home, SME, Personal, ya FD?', chips:['Car Loan','Tractor Loan','Truck Loan','Pre-Owned','Home Loan','SME Loan','Personal Loan','FD']};
    _st.product = v;
    _st.step = 'wait_custtype';
    return {a:'Customer kaisa hai?\n\n1. Naya Customer (pehli baar)\n2. Existing Customer (pehle se MMFSL se loan le chuka hai)', chips:['Naya Customer','Existing Customer']};
  }

  if(_st.step === 'wait_obj'){
    resetState();
    return handleObj(lo, db);
  }

  // Fresh input — detect intent
  // INSURANCE
  if(lo.includes('insurance') || lo.includes('bima') || lo.includes('insure') || lo.includes('jeevan') || lo.includes('life insurance') || lo.includes('term plan')){
    const v = detectVehicle(lo);
    if(v){
      _st = {step:'wait_custtype', section:'insurance', product:v};
      return {a:'Customer kaisa hai?\n\n1. Naya Customer (pehli baar)\n2. Existing Customer (pehle se MMFSL se loan le chuka hai)', chips:['Naya Customer','Existing Customer']};
    }
    _st = {step:'wait_ins_product', section:'insurance', product:null};
    return {a:'Insurance pitch — kaunsa product?\n\n1. Car\n2. Tractor\n3. Commercial Vehicle (Truck/Tempo)\n4. Rickshaw / E-Rickshaw\n5. Passenger Vehicle (Bus/Taxi)\n6. Two-Wheeler\n7. Life Insurance (HDFC)', chips:['Car','Tractor','Truck','Rickshaw','Bus/Taxi','Two-Wheeler','Life Insurance']};
  }

  // LOAN PITCH
  if(lo.includes('loan pitch') || lo.includes('loan ki pitch') || (lo.includes('pitch') && !lo.includes('insurance') && !lo.includes('objection'))){
    const v = detectLoan(lo);
    if(v){
      _st = {step:'wait_custtype', section:'loans', product:v};
      return {a:'Customer kaisa hai?\n\n1. Naya Customer (pehli baar)\n2. Existing Customer (pehle se MMFSL se loan le chuka hai)', chips:['Naya Customer','Existing Customer']};
    }
    _st = {step:'wait_loan_product', section:'loans', product:null};
    return {a:'Kaunse loan ki pitch?\n\n1. Car Loan\n2. Tractor Loan\n3. Commercial Vehicle\n4. Pre-Owned Vehicle\n5. Home Loan\n6. SME/Business Loan\n7. Personal/Suvidha Loan\n8. Fixed Deposit', chips:['Car Loan','Tractor Loan','Truck Loan','Pre-Owned','Home Loan','SME Loan','Personal Loan','FD']};
  }

  // DIRECT loan shortcuts
  if(lo.includes('tractor') && (lo.includes('loan') || lo.includes('kisan') || lo.includes('kheti'))){
    _st = {step:'wait_custtype', section:'loans', product:'tractor'};
    return {a:'Customer kaisa hai?\n\n1. Naya Customer\n2. Existing Customer', chips:['Naya Customer','Existing Customer']};
  }
  if(lo.includes('car') && lo.includes('loan')){
    _st = {step:'wait_custtype', section:'loans', product:'car'};
    return {a:'Customer kaisa hai?\n\n1. Naya Customer\n2. Existing Customer', chips:['Naya Customer','Existing Customer']};
  }
  if((lo.includes('truck')||lo.includes('tempo')||lo.includes('commercial')) && lo.includes('loan')){
    _st = {step:'wait_custtype', section:'loans', product:'truck'};
    return {a:'Customer kaisa hai?\n\n1. Naya Customer\n2. Existing Customer', chips:['Naya Customer','Existing Customer']};
  }

  // OBJECTIONS
  if(lo.includes('objection') || lo.includes('handle')){
    _st = {step:'wait_obj', section:'objections', product:null};
    return {a:'Kaunsa objection?\n\n1. Rate/Byaj zyada hai\n2. Trust nahi / Private company\n3. Paisa nahi / Budget nahi\n4. Sochna hai / Kal bata dunga\n5. Bank se lunga\n6. Kuch aur', chips:['Rate zyada','Trust nahi','Paisa nahi','Sochna hai','Bank se lunga','Kuch aur']};
  }
  // Direct objection shortcuts
  if(lo.includes('rate') || lo.includes('byaj')) return handleObj('rate', db);
  if((lo.includes('trust')||lo.includes('bharosa')) && lo.includes('nahi')) return handleObj('trust', db);
  if(lo.includes('paisa nahi')||lo.includes('budget nahi')) return handleObj('budget', db);
  if(lo.includes('sochna')||lo.includes('kal bata')) return handleObj('delay', db);
  if(lo.includes('bank')&&(lo.includes('se lunga')||lo.includes('objection'))) return handleObj('bank', db);

  // DEAL CLOSE
  if(lo.includes('close')||lo.includes('deal')||lo.includes('commit'))
    return {a:'Deal Close karne ka tarika:\n\n"Aaj sirf Aadhaar aur ek photo — baaki main sambhalunga. 2 din mein jawab."\n\nAtke toh: "Form bhar lete hain — haan hoga toh aage, nahi toh cancel. Koi commitment nahi."\n\nForm fill karna = psychological commitment — yahi sabse effective close hai.', chips: defaultChips()};

  // DOCUMENTS
  if(lo.includes('document')||lo.includes('kagaz')||lo.includes('kya chahiye')||lo.includes('kya lagega'))
    return {a:'Kisi bhi MMFSL loan ke liye:\n\n1. Aadhaar Card\n2. PAN Card\n3. 2 Passport Photos\n4. 6 Mahine Bank Passbook\n5. Income Proof:\n   - Salaried: Salary Slip\n   - Business: ITR\n   - Kisan: Zameen ke Kagaz (ITR NAHI chahiye)\n\nVehicle loan mein: Dealer Quotation bhi.', chips: defaultChips()};

  // HARVEST EMI
  if(lo.includes('harvest')||lo.includes('6 mahine')||lo.includes('moratorium'))
    return {a:'Harvest EMI — MMFSL ka sabse bada USP:\n\nPehle 6 mahine koi EMI nahi — pehle fasal aao, phir bhar do. Rabi ya Kharif — jis pe kisan depend kare, usi ke baad EMI shuru.\n\nYeh feature sirf MMFSL deta hai, banks nahi. Hamesha pitch mein use karo.', chips: defaultChips()};

  // EMI
  if(lo.includes('emi')||lo.includes('hisaab')||lo.includes('kitni hogi'))
    return {a:'EMI Approximate:\n\nRs.1 lakh, 5 saal = Rs.2,000-2,500/month\nTractor Rs.5 lakh = Rs.10,000-12,000\nCar Rs.4 lakh = Rs.8,000-9,500\n\nHarvest EMI: pehle 6 mahine ZERO!\nEMI kam karni ho: tenure badha do.', chips: defaultChips()};

  // PROCESS
  if(lo.includes('process')||lo.includes('approval')||lo.includes('kitne din'))
    return {a:'MMFSL Loan Process:\n\nKagaz jama karo\n→ 2 working days mein decision\n→ Disbursement seedha bank/dealer\n\nField officer ghar aata hai — aapko kuch nahi karna. Same day bhi possible.\n\nApp: "Mahindra Finance" on Play Store / App Store se track karo.', chips: defaultChips()};

  // COMPANY
  if(lo.includes('mmfsl')||lo.includes('mahindra')||lo.includes('company')||lo.includes('kya hai'))
    return {a:'MMFSL — Mahindra & Mahindra Financial Services Limited:\n\n- 32 saal purani company\n- 1 crore+ customers\n- 1,386+ branches, 4 lakh+ gaon\n- NSE/BSE listed, RBI registered\n- Mahindra Group ka hissa\n\nProducts: Car, Tractor, CV, SME, Home Loan, FD, Life & Vehicle Insurance — sab.', chips: defaultChips()};

  // Updates check
  const upds = db.updates || [];
  for(const u of upds){
    const words = lo.split(/\s+/).filter(w=>w.length>1);
    if(words.some(w=>u.title.toLowerCase().includes(w)||u.body.toLowerCase().includes(w)))
      return {a:'\uD83D\uDCE2 Nayi update: '+u.title+'\n\n'+u.body, chips: defaultChips()};
  }

  // Fallback
  return {a:'Kya poochh rahe ho:\n\n\u2022 Insurance pitch (car/tractor/truck/rickshaw/bus/bike/life)\n\u2022 Loan pitch (car/tractor/truck/home/sme/personal/fd)\n\u2022 Objection handle\n\u2022 Documents\n\u2022 Deal close\n\u2022 EMI hisaab', chips: defaultChips()};
}

function handleObj(lo, db){
  let key = 'other';
  if(lo.includes('rate')||lo.includes('byaj')||lo.includes('1')) key='rate';
  else if(lo.includes('trust')||lo.includes('bharosa')||lo.includes('2')) key='trust';
  else if(lo.includes('paisa')||lo.includes('budget')||lo.includes('3')) key='budget';
  else if(lo.includes('soch')||lo.includes('kal')||lo.includes('4')) key='delay';
  else if(lo.includes('bank')||lo.includes('5')) key='bank';
  const okey = 'objections_' + key;
  const parts = getVariants(okey, db);
  if(parts.length){
    if(!_st.variantIdx) _st.variantIdx = {};
    _st.variantIdx[okey] = 0;
    _st.lastKey = okey;
    const suffix = parts.length > 1 ? '\n\n_(1/' + parts.length + ' variants — "try again" bolo)_' : '';
    return {a: parts[0].trim() + suffix, chips: parts.length > 1 ? ['Try again', ...defaultChips().slice(0,4)] : defaultChips()};
  }
  return {a: 'Yeh objection script admin mein fill karni hai.', chips: defaultChips()};
}

function detectVehicle(lo){
  if(lo.includes('life')||lo.includes('jeevan')||lo.includes('term')) return 'life';
  if(lo.includes('car')) return 'car';
  if(lo.includes('tractor')) return 'tractor';
  if(lo.includes('truck')||lo.includes('tempo')||lo.includes('commercial')) return 'truck';
  if(lo.includes('rickshaw')||lo.includes('auto')||lo.includes('e-rickshaw')) return 'rickshaw';
  if(lo.includes('bus')||lo.includes('taxi')||lo.includes('passenger')) return 'bus';
  if(lo.includes('bike')||lo.includes('two-wheeler')||lo.includes('two wheeler')||lo.includes('scooter')) return 'bike';
  return null;
}

function detectLoan(lo){
  if(lo.includes('tractor')||lo.includes('kisan')||lo.includes('kheti')) return 'tractor';
  if(lo.includes('car')) return 'car';
  if(lo.includes('truck')||lo.includes('tempo')||lo.includes('commercial')) return 'truck';
  if(lo.includes('pre-owned')||lo.includes('purani')||lo.includes('used')||lo.includes('second')) return 'preowned';
  if(lo.includes('home')||lo.includes('ghar')) return 'home';
  if(lo.includes('sme')||lo.includes('business')||lo.includes('machinery')||lo.includes('dukaan')) return 'sme';
  if(lo.includes('personal')||lo.includes('suvidha')) return 'personal';
  if(lo.includes('fd')||lo.includes('deposit')||lo.includes('invest')) return 'fd';
  return null;
}

function defaultChips(){ return ['Insurance pitch','Tractor loan pitch','Rate objection','Documents','Deal close']; }

/* ══ CHAT UI ══ */
let _busy=false, _typ=null;

function doSend(){
  if(_busy) return;
  const el=document.getElementById('txta');
  const msg=el.value.trim();
  if(!msg) return;
  _busy=true; el.value=''; el.style.height=''; el.blur();
  addBubble(msg,'me');
  showTyping();
  setTimeout(()=>{
    hideTyping();
    const r=respond(msg);
    addBubble(r.a,'bot');
    setChips(r.chips);
    _busy=false;
  }, 180+Math.random()*300);
}

function addBubble(text,who){
  const w=document.getElementById('msgs');
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  const row=document.createElement('div');
  row.className='row '+who;
  const meta='<div class="bmeta"><span class="bt">'+now+'</span></div>';
  if(who==='me') row.innerHTML='<div class="bbl me">'+esc(text)+meta+'</div>';
  else row.innerHTML='<div class="bav">M</div><div class="bbl bot">'+fmt(text)+meta+'</div>';
  w.appendChild(row);
  requestAnimationFrame(()=>{ w.scrollTop=w.scrollHeight; });
}
function fmt(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/- /g,'&#x2022; '); }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showTyping(){ if(_typ)return; const w=document.getElementById('msgs'); _typ=document.createElement('div'); _typ.className='trow'; _typ.innerHTML='<div class="bav">M</div><div class="tbbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'; w.appendChild(_typ); requestAnimationFrame(()=>{ w.scrollTop=w.scrollHeight; }); }
function hideTyping(){ if(_typ){_typ.remove();_typ=null;} }
function clearChat(){ const w=document.getElementById('msgs'); while(w.children.length>2)w.removeChild(w.lastChild); _busy=false; _typ=null; resetState(); hideTyping(); setChips(defaultChips()); toast('Chat saaf ho gayi'); setTimeout(()=>addBubble('Nayi baat shuru karte hain! Insurance, loan, objections — kuch bhi poochho.','bot'),300); }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();} }
function grow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,92)+'px'; }
function useSug(btn){ if(_busy)return; document.getElementById('txta').value=btn.textContent; doSend(); }

function productBlock(p, section, db){
const newTxt  = ((db.pitches[section]||{})[p.key]||{}).new || ‘’;
const exTxt   = ((db.pitches[section]||{})[p.key]||{}).existing || ‘’;
const hasnew  = newTxt.trim().length > 0;
const hasex   = exTxt.trim().length > 0;
return `<div class="psec" style="margin-bottom:10px;">
<div class="psec-hdr" style="background:${p.color};" onclick="toggleSec('sec_${section}_${p.key}',this)">
<span class="psec-hdr-lbl">${p.label}</span>
<span style="font-size:11px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:20px;color:#fff;margin-right:6px;">${hasnew&&hasex?‘Both filled’:hasnew||hasex?‘Partial’:‘Empty’}</span>
<span class="psec-arr">▾</span>
</div>
<div id="sec_${section}_${p.key}" class="psec-body">
<div class="ctype-tabs">
<button class="ctype-tab on" id="ct_${section}_${p.key}_new" onclick="switchCT('${section}','${p.key}','new')">Naya Customer</button>
<button class="ctype-tab" id="ct_${section}_${p.key}_existing" onclick="switchCT('${section}','${p.key}','existing')">Existing Customer</button>
</div>
<div id="ct_body_${section}_${p.key}_new" class="pitch-card">
<div class="pitch-lbl">Naya Customer ke liye pitch:</div>
<textarea class="pitch-txt${hasnew?'':' empty'}" id="txt_${section}_${p.key}_new" placeholder="Yahan naye customer ke liye pitch likho...">${newTxt}</textarea>
<div class="pitch-hint">Jab user “insurance pitch” + naya customer bole tab yahi aayega. Alag variants ke beech mein sirf — likhо (teen dash) — “try again” bolne pe agli variant aayegi.</div>
<div class="save-row">
<button class="btn-save-pitch" onclick="savePitch('${section}','${p.key}','new')">Save & Sync →</button>
<span class="saved-badge" id="badge_${section}_${p.key}_new">✅ Saved</span>
</div>
</div>
<div id="ct_body_${section}_${p.key}_existing" class="pitch-card" style="display:none;">
<div class="pitch-lbl">Existing Customer ke liye pitch:</div>
<textarea class="pitch-txt${hasex?'':' empty'}" id="txt_${section}_${p.key}_existing" placeholder="Yahan existing customer ke liye pitch likho...">${exTxt}</textarea>
<div class="pitch-hint">Jab user “insurance pitch” + existing customer bole tab yahi aayega. Alag variants ke beech mein sirf — likhо (teen dash) — “try again” bolne pe agli variant aayegi.</div>
<div class="save-row">
<button class="btn-save-pitch" onclick="savePitch('${section}','${p.key}','existing')">Save & Sync →</button>
<span class="saved-badge" id="badge_${section}_${p.key}_existing">✅ Saved</span>
</div>
</div>
</div>

  </div>`;
}

<div class="psec-hdr" style="background:${p.color};" onclick="toggleSec('sec_obj_${p.key}',this)">
<span class="psec-hdr-lbl">${p.label}</span>
<span style="font-size:11px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:20px;color:#fff;margin-right:6px;">${has?‘Filled’:‘Empty’}</span>
<span class="psec-arr">▾</span>

<div id="sec_obj_${p.key}" class="psec-body">

function toggleSec(id, hdr){
const el=document.getElementById(id);
if(!el)return;
const open=el.style.display===‘none’||el.style.display===’’;
el.style.display=open?‘block’:‘none’;
const arr=hdr.querySelector(’.psec-arr’);
if(arr)arr.classList.toggle(‘open’,open);
}

function switchCT(section, product, ct){
[‘new’,‘existing’].forEach(c=>{
document.getElementById(‘ct_’+section+’*’+product+’*’+c)?.classList.toggle(‘on’,c===ct);
const b=document.getElementById(‘ct_body_’+section+’*’+product+’*’+c);
if(b)b.style.display=c===ct?‘block’:‘none’;
});
}

async function savePitch(section, product, ct){
const el=document.getElementById(‘txt_’+section+’*’+product+’*’+ct);
if(!el)return;
const val=el.value.trim();
const db=getDB();
if(!db.pitches[section])db.pitches[section]={};
if(!db.pitches[section][product])db.pitches[section][product]={new:’’,existing:’’};
db.pitches[section][product][ct]=val;
saveDB(db);
el.classList.remove(‘empty’);
const btn=el.closest(’.pitch-card’).querySelector(’.btn-save-pitch’);
const badge=document.getElementById(‘badge_’+section+’*’+product+’*’+ct);
if(btn){btn.textContent=‘Syncing…’;btn.disabled=true;}
const ok=await pushUp();
if(btn){btn.textContent=‘Save & Sync →’;btn.disabled=false;}
if(badge){badge.style.display=‘flex’;setTimeout(()=>badge.style.display=‘none’,2000);}
toast(ok?‘✅ Saved & synced!’:’ Saved locally’);
}

async function saveObj(key){
const el=document.getElementById(‘txt_obj_’+key);
if(!el)return;
const val=el.value.trim();
const db=getDB();
if(!db.objections)db.objections={};
db.objections[key]=val;
saveDB(db);
el.classList.remove(‘empty’);
const btn=el.closest(’.pitch-card’).querySelector(’.btn-save-pitch’);
const badge=document.getElementById(‘badge_obj_’+key);
if(btn){btn.textContent=‘Syncing…’;btn.disabled=true;}
const ok=await pushUp();
if(btn){btn.textContent=‘Save & Sync →’;btn.disabled=false;}
if(badge){badge.style.display=‘flex’;setTimeout(()=>badge.style.display=‘none’,2000);}
toast(ok?‘✅ Saved & synced!’:’ Saved locally’);
}

async function addUpd(){
const title=document.getElementById(‘ut’).value.trim();
const body=document.getElementById(‘ub’).value.trim();
if(!title||!body){toast(‘Title aur Details fill karo’);return;}
const db=getDB();
if(!db.updates)db.updates=[];
db.updates.push({id:‘u’+Date.now(),title,body,ts:Date.now()});
saveDB(db);
const btn=document.getElementById(‘upd-btn’);
btn.textContent=‘Syncing…’;btn.disabled=true;
const ok=await pushUp();
btn.textContent=‘Post & Sync to All Phones’;btn.disabled=false;
toast(ok?‘📢 Posted & synced!’:’ Posted locally’);
renderTab(‘upd’);
}
async function delUpd(id){
const db=getDB();
db.updates=(db.updates||[]).filter(u=>u.id!==id);
saveDB(db);
await pushUp();
toast(‘Deleted & synced’);
renderTab(‘upd’);
}

function saveCreds(){ const u=document.getElementById(‘nuu’).value.trim(); const p=document.getElementById(‘nup’).value; if(!u){toast(‘Username required’);return;} const c=getCfg(); c.user=u; if(p)c.pass=p; saveCfg(c); toast(‘✅ Credentials updated!’); }
function exportDB(){ const b=new Blob([JSON.stringify(getDB(),null,2)],{type:‘application/json’}); const a=document.createElement(‘a’); a.href=URL.createObjectURL(b); a.download=‘mmfsl_db_’+new Date().toISOString().slice(0,10)+’.json’; a.click(); }
function importDB(){ const f=document.getElementById(‘imp-file’)?.files[0]; if(!f){toast(‘File select karo’);return;} const r=new FileReader(); r.onload=async ev=>{try{const d=JSON.parse(ev.target.result); saveDB(d); const ok=await pushUp(); toast(ok?‘✅ Imported & synced!’:’ Imported locally’); renderTab(_curtab);}catch{toast(‘Invalid JSON’);}}; r.readAsText(f); }

let _modalDo=null;

let _rec=null,_ron=false;
function toggleMic(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){toast(‘Voice aapke browser mein nahi’);return;} const btn=document.getElementById(‘micbtn’); if(_ron){_rec?.stop();return;} _rec=new SR(); _rec.lang=‘hi-IN’; _rec.interimResults=false; _rec.onresult=e=>{document.getElementById(‘txta’).value=e.results[0][0].transcript;grow(document.getElementById(‘txta’));}; _rec.onerror=_rec.onend=()=>{_ron=false;btn.classList.remove(‘rec’);}; _rec.start();_ron=true;btn.classList.add(‘rec’); }

/* ══ TOAST ══ */
let _tt;
function toast(msg){ const el=document.getElementById(‘toast’); el.textContent=msg; el.classList.add(‘show’); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove(‘show’),2600); }
