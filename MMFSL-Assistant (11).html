<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#C0001D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MMFSL Sales Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:-webkit-fill-available;}
body{position:fixed;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#ECE5DD;}

/* SHELL */
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#ECE5DD;padding-top:env(safe-area-inset-top,0px);}

/* HEADER */
#hdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px 10px;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.hav{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.hname{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{font-size:11px;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:3px;margin-top:1px;}
.odot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.hbtn{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn:active{background:rgba(255,255,255,.18);}

/* MESSAGES */
#msgs{flex:1 1 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 8px 6px;}
#msgs::-webkit-scrollbar{display:none;}
.dc{text-align:center;margin:4px 0 8px;}
.dc span{font-size:11.5px;color:#555;background:rgba(255,255,255,.88);padding:3px 12px;border-radius:7px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.row{display:flex;align-items:flex-end;gap:4px;margin-bottom:3px;}
.row.me{flex-direction:row-reverse;}
.bav{width:26px;height:26px;border-radius:50%;background:#C0001D;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;}
.bbl{max-width:82%;padding:8px 11px 5px;font-size:14.5px;line-height:1.5;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.bbl.me{background:#C0001D;color:#fff;border-radius:8px 2px 8px 8px;animation:pop .15s ease-out;}
.bbl.bot{background:#fff;color:#111;border-radius:2px 8px 8px 8px;animation:pop .15s ease-out;}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(4px);}to{opacity:1;transform:none;}}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px;}
.bt{font-size:10px;opacity:.5;white-space:nowrap;}
.bbl.me .bt{color:rgba(255,255,255,.8);}
.bbl.bot .bt{color:#666;}
.wcard{text-align:center;padding:18px 8px 12px;}
.wico{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;}
.wtit{font-size:15px;font-weight:700;color:#1a1a1a;}
.wsub{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}

/* TYPING */
.trow{display:flex;align-items:flex-end;gap:4px;margin-bottom:4px;}
.tbbl{background:#fff;border-radius:2px 8px 8px 8px;padding:10px 14px;display:flex;gap:4px;align-items:center;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.dot{width:7px;height:7px;border-radius:50%;background:#C0001D;}
.dot:nth-child(1){animation:bnc 1.2s 0s infinite;}
.dot:nth-child(2){animation:bnc 1.2s .18s infinite;}
.dot:nth-child(3){animation:bnc 1.2s .36s infinite;}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.3;}30%{transform:translateY(-6px);opacity:1;}}

/* SUGGESTIONS */
#sugs{flex:0 0 auto;display:flex;gap:6px;overflow-x:auto;padding:5px 8px;background:#ECE5DD;border-top:1px solid rgba(0,0,0,.07);}
#sugs::-webkit-scrollbar{display:none;}
.sg{white-space:nowrap;padding:5px 12px;border-radius:18px;border:1.5px solid #C0001D;background:#fff;color:#C0001D;font-size:12.5px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:inherit;}
.sg:active{background:#C0001D;color:#fff;}

/* INPUT BAR */
#ibar{flex:0 0 auto;background:#F0F0F0;border-top:1px solid #d0d0d0;display:flex;align-items:flex-end;gap:6px;padding:7px 8px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));}
#txta{flex:1;min-height:40px;max-height:92px;padding:9px 13px;border-radius:20px;border:none;outline:none;background:#fff;font-size:16px;font-family:inherit;line-height:1.4;color:#111;resize:none;overflow-y:auto;box-shadow:0 1px 2px rgba(0,0,0,.1);-webkit-appearance:none;}
#txta::placeholder{color:#aaa;}
.ibtn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;}
#micbtn{background:#fff;color:#555;box-shadow:0 1px 2px rgba(0,0,0,.12);}
#micbtn.rec{background:#C0001D;color:#fff;}
#sndbtn{background:#C0001D;color:#fff;box-shadow:0 2px 5px rgba(192,0,29,.4);}
#sndbtn:active{background:#8B0015;}

/* SIDE SCREENS */
.sscr{position:fixed;inset:0;max-width:480px;margin:0 auto;display:flex;flex-direction:column;background:#fff;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;padding-top:env(safe-area-inset-top,0px);}
.sscr.open{transform:none;}
.shdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px 10px;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.sbk{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* LOGIN */
.lbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:18px;}
.llogo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:28px;}
.ltit{font-size:20px;font-weight:700;color:#111;text-align:center;}
.lsub{font-size:13px;color:#888;text-align:center;}
.lform{width:100%;display:flex;flex-direction:column;gap:12px;}
.flbl{font-size:12px;font-weight:600;color:#555;margin-bottom:3px;}
.finp{width:100%;padding:13px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.finp:focus{border-color:#C0001D;background:#fff;}
.lerr{font-size:12.5px;color:#C0001D;text-align:center;display:none;}
.lblogin{width:100%;padding:14px;background:#C0001D;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;}
.lblogin:active{background:#8B0015;}

/* ADMIN PANEL */
#adm-scr{background:#f4f4f4;}
#tabs{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 5px;border:none;background:none;color:#bbb;font-family:inherit;cursor:pointer;font-size:9.5px;font-weight:500;}
.tabi{font-size:17px;line-height:1;}
.tab.on{color:#C0001D;}
#abody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px;}
#abody::-webkit-scrollbar{display:none;}

/* ADMIN CARDS */
.card{background:#fff;border-radius:12px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ctit{font-size:13px;font-weight:700;color:#222;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.cbdg{margin-left:auto;background:#fff0f1;color:#C0001D;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}

/* PRODUCT TREE */
.ptop{border-radius:10px;overflow:hidden;border:1px solid #eee;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.ptop-hdr{display:flex;align-items:center;padding:11px 12px;cursor:pointer;user-select:none;}
.ptop-hdr-lbl{font-size:13px;font-weight:700;color:#fff;flex:1;}
.ptop-badge{background:rgba(255,255,255,.28);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-right:8px;}
.ptop-arr{color:rgba(255,255,255,.8);font-size:14px;transition:transform .2s;}
.ptop-body{background:#fafafa;padding:6px 8px;}
.psub{margin-bottom:6px;border-radius:8px;overflow:hidden;border:1px solid #eee;}
.psub-hdr{display:flex;align-items:center;padding:8px 10px;background:#fff;cursor:pointer;user-select:none;}
.psub-lbl{font-size:12px;font-weight:600;color:#333;flex:1;}
.psub-badge{background:#fff0f1;color:#C0001D;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600;margin-right:6px;}
.psub-arr{color:#bbb;font-size:12px;transition:transform .2s;}
.psub-body{padding:4px 6px 6px;}
.arr-open{transform:rotate(180deg);}

/* KB ITEMS */
.ki{border:1px solid #eee;border-radius:8px;padding:9px 11px;margin-bottom:5px;background:#fff;}
.ki:last-child{margin-bottom:0;}
.kq{font-size:12px;font-weight:600;color:#222;margin-bottom:2px;}
.ka{font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ktr{font-size:10.5px;color:#059669;margin-top:3px;}
.kno{font-size:10.5px;color:#e97316;margin-top:3px;}
.ktgs{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.ktg{font-size:10px;padding:1px 6px;border-radius:20px;background:#fff0f1;color:#C0001D;font-weight:500;}
.kact{display:flex;gap:5px;justify-content:flex-end;margin-top:6px;}
.bedit{font-size:11px;padding:4px 9px;border-radius:6px;border:none;background:#f0f0f0;color:#444;cursor:pointer;font-family:inherit;}
.bdel{font-size:11px;padding:4px 9px;border-radius:6px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-family:inherit;}
.btest{font-size:11px;padding:4px 9px;border-radius:6px;border:none;background:#ecfdf5;color:#065f46;cursor:pointer;font-family:inherit;}
.empty-sub{font-size:11.5px;color:#bbb;text-align:center;padding:10px;background:#fff;border-radius:6px;border:1px dashed #e0e0e0;}

/* FORMS */
.aform{display:flex;flex-direction:column;gap:10px;}
.ainp,.atxt{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.ainp:focus,.atxt:focus{border-color:#C0001D;background:#fff;}
.atxt{min-height:80px;resize:vertical;}
.prirow{display:flex;gap:6px;}
.pribtn{flex:1;padding:7px;border-radius:7px;border:1.5px solid #ddd;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#888;font-family:inherit;}
.pribtn.on{border-color:#C0001D;background:#fff0f1;color:#C0001D;}
.bsub{background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;}
.bsub:active{background:#8B0015;}
.bsub:disabled{opacity:.65;}
.bgray{background:#555;}
.bred{background:#dc2626;}
.info{border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;margin-bottom:4px;}
.iblue{background:#eff6ff;color:#1e3a8a;}
.igreen{background:#ecfdf5;color:#065f46;}
.ired{background:#fff0f0;color:#991b1b;}
.iblue ol{margin-left:14px;margin-top:4px;}
.iblue a{color:#1d4ed8;}
.srchw{position:relative;}
.srch{width:100%;padding:9px 12px 9px 34px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.srch:focus{border-color:#C0001D;background:#fff;}
.sric{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px;pointer-events:none;}
.ver{font-size:10.5px;color:#ccc;text-align:center;padding:6px;font-family:monospace;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:#fff;border-radius:10px;padding:10px 6px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.sn{font-size:20px;font-weight:700;color:#C0001D;}
.sl{font-size:10px;color:#999;font-weight:500;margin-top:1px;}
.kbl{display:flex;flex-direction:column;gap:0;}
.kbl .ki{border-radius:0;border-left:none;border-right:none;border-top:none;}
.kbl .ki:first-child{border-radius:8px 8px 0 0;border-top:1px solid #eee;}
.kbl .ki:last-child{border-radius:0 0 8px 8px;}
.kbl .ki:only-child{border-radius:8px;}

/* MODAL */
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#mbg.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -4px 20px rgba(0,0,0,.2);}
.mtit{font-size:15px;font-weight:700;color:#111;margin-bottom:14px;}
.mbtns{display:flex;gap:10px;margin-top:14px;}
.bcancel{flex:1;background:#f0f0f0;color:#444;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.bsave{flex:1;background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}

/* TOAST */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(20,20,20,.9);color:#fff;padding:8px 16px;border-radius:18px;font-size:12.5px;font-weight:500;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;transition:transform .22s,opacity .22s;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- CHAT SCREEN -->
<div id="app">
  <div id="hdr">
    <div class="hav">🤖</div>
    <div class="hinfo">
      <div class="hname">MMFSL Sales Assistant</div>
      <div class="hsub"><span class="odot"></span>Online · Mahindra Finance</div>
    </div>
    <button class="hbtn" onclick="openAdmin()">⚙️</button>
    <button class="hbtn" onclick="clearChat()">🗑️</button>
  </div>
  <div id="msgs">
    <div class="wcard">
      <div class="wico">🏦</div>
      <div class="wtit">MMFSL Sales Assistant</div>
      <div class="wsub">Loans, Insurance, Objections — sab Hindi mein.<br>Poochho kuch bhi! 💼</div>
    </div>
    <div class="dc"><span id="dlbl">Aaj</span></div>
  </div>
  <div id="sugs">
    <button class="sg" onclick="useSug(this)">Insurance pitch</button>
    <button class="sg" onclick="useSug(this)">Tractor loan pitch</button>
    <button class="sg" onclick="useSug(this)">Rate objection</button>
    <button class="sg" onclick="useSug(this)">Documents?</button>
    <button class="sg" onclick="useSug(this)">Deal close karo</button>
  </div>
  <div id="ibar">
    <button class="ibtn" id="micbtn" onclick="toggleMic()">🎙️</button>
    <textarea id="txta" placeholder="Kuch bhi poochho…" rows="1" oninput="grow(this)" onkeydown="onKey(event)"></textarea>
    <button class="ibtn" id="sndbtn" onclick="doSend()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div class="sscr" id="lscr">
  <div class="shdr">
    <button class="sbk" onclick="close_('lscr')">‹</button>
    <div class="hav">🔐</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Login</div></div>
  </div>
  <div class="lbody">
    <div class="llogo">🔐</div>
    <div><div class="ltit">Admin Panel</div><div class="lsub" style="margin-top:4px;">Knowledge base manage karo</div></div>
    <div class="lform">
      <div><div class="flbl">Username</div><input class="finp" id="lu" type="text" placeholder="Username" autocomplete="username"></div>
      <div><div class="flbl">Password</div><input class="finp" id="lp" type="password" placeholder="Password" autocomplete="current-password"></div>
      <div class="lerr" id="lerr">Username ya password galat hai ⚠️</div>
      <button class="lblogin" onclick="doLogin()">Login karein →</button>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div class="sscr" id="ascr" style="background:#f4f4f4;">
  <div class="shdr">
    <button class="sbk" onclick="close_('ascr')">‹</button>
    <div class="hav">📚</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Panel</div><div style="font-size:11px;color:rgba(255,255,255,.8);">Knowledge Base</div></div>
    <button class="hbtn" onclick="doLogout()">🚪</button>
  </div>
  <div id="tabs">
    <button class="tab on" id="tkb"  onclick="st('kb')"><div class="tabi">📚</div>KB</button>
    <button class="tab"    id="tadd" onclick="st('add')"><div class="tabi">➕</div>Add</button>
    <button class="tab"    id="tupd" onclick="st('upd')"><div class="tabi">📢</div>Updates</button>
    <button class="tab"    id="timp" onclick="st('imp')"><div class="tabi">📥</div>Import</button>
    <button class="tab"    id="tset" onclick="st('set')"><div class="tabi">⚙️</div>Settings</button>
  </div>
  <div id="abody"></div>
</div>

<!-- MODAL -->
<div id="mbg" onclick="if(event.target===this)closeMod()">
  <div class="modal">
    <div class="mtit" id="mtit">Edit Entry</div>
    <div id="mbody"></div>
    <div class="mbtns">
      <button class="bcancel" onclick="closeMod()">Cancel</button>
      <button class="bsave" onclick="saveEdit()">Save & Sync</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

/* ==============================================
   KNOWLEDGE BASE — MMFSL Official Products
   Source: mahindrafinance.com | Hindi/Hinglish
============================================== */
const FKB = [
  // COMPANY
  {id:'k01',q:'MMFSL kya hai',a:'Mahindra & Mahindra Financial Services Limited (MMFSL) India ki top NBFCs mein se ek hai — 32 saal se rural aur semi-urban India ki seva. 1 crore+ customers, 1386+ branches, 4 lakh+ gaon mein reach. Mahindra Group ka hissa — wahi Mahindra jo tractor, Scorpio, Bolero banata hai. RBI registered, NSE/BSE listed — bilkul safe.',tags:['company','mmfsl'],triggers:['mmfsl','mahindra finance','company','parichay','kya hai'],pri:'high'},
  {id:'k02',q:'MMFSL ke products kya hain',a:'MMFSL mein sab milta hai: Car Loan (100% funding), Tractor Loan (harvest EMI), Commercial Vehicle Loan, Pre-Owned Vehicle Loan, Personal/Suvidha Loan, Home Loan (9.29% se), SME/Machinery Loan, FD (7.35% — Samruddhi & Dhanvruddhi), Life Insurance (HDFC), Vehicle Insurance. Ek hi jagah sab kuch.',tags:['products','overview'],triggers:['products','sab kya','kya kya milta','services'],pri:'high'},

  // CAR LOAN
  {id:'k03',q:'Car loan pitch',a:'Pitch: "Bhaiya, aaj gadi lo — ek paisa nahi chahiye, 100% MMFSL dega."\n✓ 100% ex-showroom funding\n✓ Maruti/Hyundai/Tata/Mahindra/Renault sab\n✓ 5 saal tenure, collateral nahi\n✓ Field officer ghar aata hai\nClose: "Kaunsi gadi pasand hai? Aaj hi quote nikalta hoon."',tags:['car','loan','pitch'],triggers:['car loan','car pitch','gaadi loan','car loan pitch'],pri:'high'},
  {id:'k04',q:'Car loan documents eligibility',a:'Documents: Aadhaar, PAN, 2 photos, 6 mahine bank statement, income proof (salary slip ya zameen ke kagaz — ITR zarori nahi). Collateral nahi. Approval kuch working days mein.',tags:['car','documents'],triggers:['car documents','car eligibility','car kagaz'],pri:'high'},

  // TRACTOR LOAN

  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const setKB=v=>LS.set('mf5_kb',v);

============================================== */
const GAS='https://script.google.com/macros/s/AKfycbwOSqWxWBje8ESVZ9SAjybltMGMJxrQX1IqNqi0xNvwVaTDyBjaHcyQ13AsSvi-ROX1Sw/exec';

function syncDown(){
  fetch(GAS+'?action=read',{signal:AbortSignal.timeout(8000)})
    .then(r=>r.ok?r.json():null)
    .then(d=>{if(d&&d.kb){setKB(d.kb);if(d.upds)setUpds(d.upds);}})
    .catch(()=>{});
}
async function pushUp(){
  try{
    const r=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'write',data:{kb:getKB(),upds:getUpds(),v:Date.now()}}),
      signal:AbortSignal.timeout(10000)});
    return r.ok;
  }catch{return false;}
}

function getInsPitch(vehicle, custType){
  const k='ip_'+vehicle+'_'+custType;
  const i=_st.ctx[k]||0;
  _st.ctx[k]=i+1;
  const arr=(INS_PITCHES[vehicle]||{})[custType]||[];
  return arr.length?arr[i%arr.length]:'Vehicle type ke hisaab se pitch mil nahi rahi. Admin se add karwao.';
}

/* ==============================================
   ANSWER ENGINE
============================================== */
function findAnswer(input){
  const lo=input.toLowerCase().trim();

  // 1. If waiting for follow-up
  if(_st.waiting){
    const w=_st.waiting;
    _st.waiting=null;
    return handleFlow(w,lo);
  }

  // 2. Admin updates first
  for(const u of getUpds()){
    const words=lo.split(/\s+/).filter(w=>w.length>1);
    if(words.some(w=>u.title.toLowerCase().includes(w)||u.body.toLowerCase().includes(w)||(u.tags||[]).some(t=>t.toLowerCase().includes(w))))
      return{a:'📢 Nayi update: '+u.title+'\n\n'+u.body,t:u.tags||[]};
  }

  // 3. Detect intent — start a flow
  if(lo.includes('insurance')||lo.includes('bima')||lo.includes('insure')||lo.includes('jeevan')||lo.includes('term plan')||(lo.includes('life ')&&lo.includes('insurance'))){
    // If vehicle type already in message, detect it
    const v=detectVehicle(lo);
    if(v){
      // Still ask new/existing
      _st.waiting='ins_custtype';
      _st.ctx.ins_vehicle=v;
      setTimeout(()=>showChips(['Naya Customer','Existing Customer']),50);
      return{a:'Insurance pitch ke liye — customer kaisa hai?\n\n1. Naya customer (pehli baar)\n2. Existing customer (pehle se MMFSL se loan le chuka hai)',t:['insurance']};
    }
    // Ask vehicle first
    _st.waiting='ins_vehicle';
    setTimeout(()=>showChips(['Car','Tractor','Truck/Tempo','Rickshaw','Bus/Taxi','Two-Wheeler','Life Insurance']),50);
    return{a:'Insurance pitch ke liye — kaunsa product?\n\n1. Car\n2. Tractor\n3. Commercial Vehicle (Truck/Tempo)\n4. Rickshaw / E-Rickshaw\n5. Passenger Vehicle (Bus/Taxi)\n6. Two-Wheeler\n7. Life Insurance (HDFC)',t:['insurance']};
  }

  if((lo.includes('pitch')&&!lo.includes('objection'))||(lo.includes('loan pitch'))||(lo.includes('kaise becho'))){
    const v=detectLoanType(lo);
    if(v){const p=getPitchVariant(v);if(p)return{a:p,t:[v,'loan','pitch']};}
    _st.waiting='loan_type';
    setTimeout(()=>showChips(['Car Loan','Tractor Loan','Truck Loan','Business Loan','Home Loan','Personal Loan','Purani Gaadi']),50);
    return{a:'Loan pitch — kaunse loan ki?\n\n1. Car Loan\n2. Tractor Loan\n3. Commercial Vehicle\n4. Business / SME\n5. Home Loan\n6. Personal / Suvidha\n7. Pre-Owned Vehicle',t:['loan']};
  }

  if(lo.includes('objection')||(lo.includes('customer')&&lo.includes('bol')&&lo.includes('nahi'))){
    _st.waiting='obj_type';
    setTimeout(()=>showChips(['Rate zyada','Trust nahi','Paisa nahi','Sochna hai','Bank se lunga','Zaroorat nahi']),50);
    return{a:'Kaunsa objection aa raha hai?\n\n1. Rate/Byaj zyada hai\n2. Trust nahi / Private company\n3. Paisa nahi / Budget nahi\n4. Sochna hai / Kal bata dunga\n5. Bank se lunga\n6. Zaroorat nahi',t:['objection']};
  }

  if(lo.includes('document')||lo.includes('kagaz')||lo.includes('kya chahiye')||lo.includes('kya lagega')){
    _st.waiting='doc_type';
    setTimeout(()=>showChips(['Car Loan','Tractor Loan','Truck Loan','Business Loan','Home Loan','Personal Loan','Life Insurance']),50);
    return{a:'Kaunse loan/product ke documents?\n\n1. Car Loan\n2. Tractor Loan\n3. Commercial Vehicle\n4. Business Loan\n5. Home Loan\n6. Personal Loan\n7. Life Insurance',t:['documents']};
  }

  if((lo.includes('emi')||lo.includes('installment')||lo.includes('hisaab'))&&!lo.includes('harvest')){
    _st.waiting='emi_type';
    setTimeout(()=>showChips(['Car','Tractor','Truck','Business','Home']),50);
    return{a:'Kaunse loan ki EMI?\n\n1. Car\n2. Tractor\n3. Commercial Vehicle\n4. Business\n5. Home',t:['emi']};
  }

  // Direct shortcut phrases
  if(lo.includes('tractor')&&(lo.includes('loan')||lo.includes('kisan')||lo.includes('kheti'))){const p=getPitchVariant('tractor');if(p)return{a:p,t:['tractor','loan']};}
  if(lo.includes('car')&&lo.includes('loan')){const p=getPitchVariant('car');if(p)return{a:p,t:['car','loan']};}
  if((lo.includes('truck')||lo.includes('tempo'))&&lo.includes('loan')){const p=getPitchVariant('truck');if(p)return{a:p,t:['truck','loan']};}
  if(lo.includes('harvest')||lo.includes('6 mahine')&&lo.includes('emi')) return{a:getKB().find(e=>e.id==='k07')?.a||'',t:['tractor','harvest']};
  if(lo.includes('byaj')||lo.includes('rate zyada')) return handleObjFlow('rate');
  if((lo.includes('trust')||lo.includes('bharosa'))&&lo.includes('nahi')) return handleObjFlow('trust');
  if(lo.includes('paisa nahi')||lo.includes('budget nahi')) return handleObjFlow('budget');
  if(lo.includes('bank')&&(lo.includes('objection')||lo.includes('lunga'))) return handleObjFlow('bank');
  if(lo.includes('close')||lo.includes('deal band')||lo.includes('commit karo')) return{a:getKB().find(e=>e.id==='k31')?.a||'',t:['closing']};

  // 4. KB trigger match (highest priority)
  for(const e of getKB()){
    if((e.triggers||[]).some(t=>lo.includes(t.toLowerCase()))){
      return{a:e.a,t:e.tags||[]};
    }
  }

  // 5. KB score match
  const words=lo.split(/\s+/).filter(w=>w.length>1);
  let best=null,bs=0;
  for(const e of getKB()){
    let sc=0;
    for(const w of words){
      if(e.q.toLowerCase().includes(w))sc+=4;
      if(e.a.toLowerCase().includes(w))sc+=1;
      if((e.tags||[]).some(t=>t.toLowerCase().includes(w)))sc+=3;
    }
    if(e.pri==='high')sc*=1.3;
    if(sc>bs){bs=sc;best=e;}
  }
  if(best&&bs>1)return{a:best.a,t:best.tags||[]};

  // 6. Fallback
  return{a:'Seedha batao kya chahiye:\n\n• Insurance pitch\n• Loan pitch\n• Objection handle\n• Documents\n• EMI hisaab\n\nYa koi bhi sawaal poochho!',t:[]};
}

function detectVehicle(lo){
  if(lo.includes('car'))return'car';
  if(lo.includes('tractor'))return'tractor';
  if(lo.includes('truck')||lo.includes('tempo')||lo.includes('commercial'))return'truck';
  if(lo.includes('rickshaw'))return'rickshaw';
  if(lo.includes('bus')||lo.includes('taxi')||lo.includes('passenger'))return'bus';
  if(lo.includes('bike')||lo.includes('two-wheeler')||lo.includes('two wheeler'))return'bike';
  if(lo.includes('life')||lo.includes('jeevan')||lo.includes('term'))return'life';
  return null;
}
function detectLoanType(lo){
  if(lo.includes('tractor'))return'tractor';
  if(lo.includes('car'))return'car';
  if(lo.includes('truck')||lo.includes('tempo'))return'truck';
  return null;
}

function handleFlow(flow, lo){
  if(flow==='ins_vehicle'){
    const v=detectVehicle(lo)||
      (lo.includes('1')?'car':lo.includes('2')?'tractor':lo.includes('3')?'truck':
       lo.includes('4')?'rickshaw':lo.includes('5')?'bus':lo.includes('6')?'bike':
       lo.includes('7')?'life':null);
    if(!v)return{a:'Vehicle type batao — Car, Tractor, Truck, Rickshaw, Bus, Bike, ya Life Insurance?',t:[]};
    _st.ctx.ins_vehicle=v;
    _st.waiting='ins_custtype';
    setTimeout(()=>showChips(['Naya Customer','Existing Customer']),50);
    return{a:'Customer kaisa hai?\n\n1. Naya customer (pehli baar)\n2. Existing customer (pehle se MMFSL se loan le chuka hai)',t:['insurance']};
  }
  if(flow==='ins_custtype'){
    const v=_st.ctx.ins_vehicle||'car';
    const ct=(lo.includes('existing')||lo.includes('purana')||lo.includes('2'))?'existing':'new';
    return{a:getInsPitch(v,ct),t:['insurance',v]};
  }
  if(flow==='loan_type'){
    const v=lo.includes('tractor')||lo==='2'?'tractor':
             lo.includes('car')||lo==='1'?'car':
             lo.includes('truck')||lo.includes('commercial')||lo==='3'?'truck':null;
    if(v){const p=getPitchVariant(v);if(p)return{a:p,t:[v,'loan']};}
    // For other loan types, use KB
    if(lo.includes('business')||lo.includes('sme')||lo==='4') return{a:getKB().find(e=>e.id==='k10')?.a||'',t:['sme','loan']};
    if(lo.includes('home')||lo.includes('ghar')||lo==='5') return{a:getKB().find(e=>e.id==='k11')?.a||'',t:['home','loan']};
    if(lo.includes('personal')||lo.includes('suvidha')||lo==='6') return{a:getKB().find(e=>e.id==='k12')?.a||'',t:['personal']};
    if(lo.includes('purani')||lo.includes('used')||lo==='7') return{a:getKB().find(e=>e.id==='k09')?.a||'',t:['pre-owned']};
    return{a:'Kaunsa loan — Car, Tractor, Truck, Business, Home, Personal, ya Purani Gaadi?',t:[]};
  }
  if(flow==='obj_type') return handleObjFlow(lo);
  if(flow==='doc_type') return handleDocFlow(lo);
  if(flow==='emi_type') return handleEmiFlow(lo);
  return{a:'Samjha nahi — phir se batao.',t:[]};
}

function handleObjFlow(lo){
  if(lo.includes('rate')||lo.includes('byaj')||lo.includes('1')) return{a:getKB().find(e=>e.id==='k25')?.a||'',t:['objection','rate']};
  if(lo.includes('trust')||lo.includes('bharosa')||lo==='2') return{a:getKB().find(e=>e.id==='k26')?.a||'',t:['objection','trust']};
  if(lo.includes('paisa')||lo.includes('budget')||lo==='3') return{a:getKB().find(e=>e.id==='k27')?.a||'',t:['objection','budget']};
  if(lo.includes('soch')||lo.includes('kal')||lo==='4') return{a:getKB().find(e=>e.id==='k28')?.a||'',t:['objection','delay']};
  if(lo.includes('bank')||lo==='5') return{a:getKB().find(e=>e.id==='k29')?.a||'',t:['objection','bank']};
  if(lo.includes('zaroorat')||lo==='6') return{a:getKB().find(e=>e.id==='k30')?.a||'',t:['objection']};
  return{a:'Objection number batao ya type karo — Rate, Trust, Paisa, Sochna, Bank, ya Zaroorat nahi?',t:[]};
}

function handleDocFlow(lo){
  if(lo.includes('car')||lo==='1') return{a:getKB().find(e=>e.id==='k04')?.a||'',t:['car','documents']};
  if(lo.includes('tractor')||lo==='2') return{a:getKB().find(e=>e.id==='k06')?.a||'',t:['tractor','documents']};

function handleEmiFlow(lo){
  if(lo.includes('car')||lo==='1') return{a:'Car Loan EMI (approximate):\n\nRs.3 lakh → Rs.6,500-7,000/month (5 saal)\nRs.5 lakh → Rs.10,000-11,000/month\nRs.8 lakh → Rs.16,000-17,500/month\n\nEMI kam karna ho: tenure badha do ya down payment do.',t:['car','emi']};

let _busy=false,_typ=null;

function doSend(){
  if(_busy)return;
  const el=document.getElementById('txta');
  const msg=el.value.trim();
  if(!msg)return;
  _busy=true;el.value='';el.style.height='';el.blur();

    _busy=false;
  },180+Math.random()*300);

function addBubble(text,who,tags=[]){
  const w=document.getElementById('msgs');
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  const row=document.createElement('div');
  row.className='row '+who;
  const tH=tags.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;">${tags.slice(0,3).map(t=>`<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#fff0f1;color:#C0001D;font-weight:500;">${t}</span>`).join('')}</div>`:'';
  const meta=`<div class="bmeta"><span class="bt">${now}</span></div>`;
  if(who==='me')row.innerHTML=`<div class="bbl me">${esc(text)}${meta}</div>`;
  else row.innerHTML=`<div class="bav">M</div><div class="bbl bot">${fmt(text)}${tH}${meta}</div>`;
  w.appendChild(row);
  requestAnimationFrame(()=>{w.scrollTop=w.scrollHeight;});
}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/✓/g,'<span style="color:#16a34a">✓</span>').replace(/\n/g,'<br>');}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTyping(){if(_typ)return;const w=document.getElementById('msgs');_typ=document.createElement('div');_typ.className='trow';_typ.innerHTML='<div class="bav">M</div><div class="tbbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';w.appendChild(_typ);requestAnimationFrame(()=>{w.scrollTop=w.scrollHeight;});}
function hideTyping(){if(_typ){_typ.remove();_typ=null;}}
function clearChat(){const w=document.getElementById('msgs');while(w.children.length>2)w.removeChild(w.lastChild);_busy=false;_typ=null;_st={waiting:null,ctx:{}};hideTyping();resetSugs();toast('Chat saaf ho gayi');setTimeout(()=>addBubble('Nayi baat shuru karte hain! Insurance, loan, objections — kuch bhi poochho.','bot',[]),300);}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,92)+'px';}
function useSug(btn){if(_busy)return;document.getElementById('txta').value=btn.textContent;doSend();}
function resetSugs(){document.getElementById('sugs').innerHTML=['Insurance pitch','Tractor loan pitch','Rate objection','Documents?','Deal close karo'].map(c=>`<button class="sg" onclick="useSug(this)">${c}</button>`).join('');}

function assignKB(){
  const kb=getKB();
  const assigned={uncat:[]};
  TREE.forEach(p=>p.subs.forEach(s=>{assigned[s.id]=[];}));
  kb.forEach(e=>{
    let found=false;
    for(const p of TREE){
      for(const s of p.subs){
        if(s.match(e)){assigned[s.id].push(e);found=true;break;}
      }
      if(found)break;
    }
    if(!found)assigned.uncat.push(e);
  });
  return assigned;
}

function toggleProd(id,hdr){
  const el=document.getElementById(id);if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  const arr=hdr.querySelector('.ptop-arr');
  if(arr)arr.style.transform=open?'rotate(180deg)':'';
}
function toggleSub(id,hdr){
  const el=document.getElementById(id);if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  const arr=hdr.querySelector('.psub-arr');
  if(arr)arr.style.transform=open?'rotate(180deg)':'';
}
function searchKB(q){
  const res=document.getElementById('srch-results');
  if(!q.trim()){res.style.display='none';return;}
  const lo=q.toLowerCase();
  const f=getKB().filter(e=>
    e.q.toLowerCase().includes(lo)||
    e.a.toLowerCase().includes(lo)||
    (e.tags||[]).join(' ').includes(lo)||
    (e.triggers||[]).join(' ').includes(lo)
  );
  res.style.display='block';
  res.innerHTML=f.length
    ?f.map(e=>`<div class="ki" id="ki_${e.id}"><div class="kq">${e.q}</div><div class="ka">${(e.a||'').substring(0,80)}…</div><div class="kact"><button class="bedit" onclick="openEdit('${e.id}')">✏️</button><button class="bdel" onclick="delEntry('${e.id}')">🗑️</button></div></div>`).join('')
    :'<div style="text-align:center;padding:12px;color:#bbb;font-size:13px;">Koi entries nahi mili</div>';
}

function testEntry(id){
  const e=getKB().find(x=>x.id===id);if(!e)return;
  const triggers=e.triggers||[];
  const testWord=triggers.length?triggers[0]:e.q.split(' ')[0];
  const prev=JSON.stringify(_st);
  const result=findAnswer(testWord);
  _st=JSON.parse(prev); // restore state after test
  const matched=result.a===e.a;
  toast(matched?'✅ "'+testWord+'" → entry milti hai':'❌ "'+testWord+'" → nahi mili. Triggers add karo.');
}
function setPri(v,btn){_pri=v;document.querySelectorAll('.prirow .pribtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function addTagInput(t){const el=document.getElementById('nt');if(!el)return;const c=el.value.split(',').map(x=>x.trim()).filter(Boolean);if(!c.includes(t))el.value=[...c,t].join(', ');}

async function addEntry(){
  const q=document.getElementById('nq').value.trim();
  const a=document.getElementById('na').value.trim();
  if(!q||!a){toast('Question aur Jawab dono fill karo');return;}
  const triggers=document.getElementById('ntr').value.split(',').map(x=>x.trim()).filter(Boolean);
  const tags=document.getElementById('nt').value.split(',').map(x=>x.trim()).filter(Boolean);
  if(!triggers.length){toast('⚠️ Trigger words bhi daalo — warna bot entry nahi dhoondh payega');return;}
  const kb=getKB();
  kb.push({id:'k'+Date.now(),q,a,triggers,tags,pri:_pri||'medium',ts:Date.now()});
  setKB(kb);
  const btn=document.getElementById('add-btn');btn.textContent='Syncing…';btn.disabled=true;
  const ok=await pushUp();
  btn.textContent='+ Add & Sync to All Phones';btn.disabled=false;
  toast(ok?'✅ Added & synced!':'✅ Added (sync pending)');
  st('kb');
}

async function delEntry(id){
  setKB(getKB().filter(e=>e.id!==id));
  document.getElementById('ki_'+id)?.remove();
  await pushUp();
  toast('Deleted & synced');
  renderTab('kb');
}

async function saveEdit(){

}

async function doImport(){
  const raw=document.getElementById('imp-data')?.value.trim();
  const okEl=document.getElementById('imp-ok');const errEl=document.getElementById('imp-err');
  okEl.style.display='none';errEl.style.display='none';
  if(!raw){errEl.textContent='Kuch paste nahi kiya!';errEl.style.display='block';return;}
  const lines=raw.split('\n').filter(l=>l.trim());
  const firstLow=lines[0].toLowerCase();
  const dataLines=firstLow.includes('question')?lines.slice(1):lines;
  if(!dataLines.length){errEl.textContent='Koi data nahi mila.';errEl.style.display='block';return;}
  const entries=[];let skipped=0;
  dataLines.forEach((line,i)=>{
    const parts=line.split('\t');
    if(parts.length<2){skipped++;return;}
    const q=(parts[0]||'').trim();const a=(parts[1]||'').trim();
    if(!q||!a){skipped++;return;}
    const triggersRaw=(parts[2]||'').trim();
    const tagsRaw=(parts[3]||'').trim();
    const priRaw=(parts[4]||'medium').trim().toLowerCase();
    const triggers=triggersRaw?triggersRaw.split(/[,;]/).map(t=>t.trim()).filter(Boolean):[];
    const tags=tagsRaw?tagsRaw.split(/[,;]/).map(t=>t.trim()).filter(Boolean):[];
    const pri=['high','medium','low'].includes(priRaw)?priRaw:'medium';
    entries.push({id:'imp_'+Date.now()+'_'+i,q,a,triggers,tags,pri,ts:Date.now()});
  });
  if(!entries.length){errEl.textContent='Valid entries nahi mili. Columns Tab se alag hone chahiye.';errEl.style.display='block';return;}
  const btn=document.getElementById('imp-btn');btn.textContent='Syncing…';btn.disabled=true;
  const merged=[...getKB(),...entries];setKB(merged);
  const ok=await pushUp();
  btn.textContent='📥 Import & Sync';btn.disabled=false;
  okEl.innerHTML='<strong>✅ '+entries.length+' entries import ho gayi!</strong>'+(skipped?' ('+skipped+' skip hue)':'')+'<br>'+(ok?'Cloud sync bhi ho gaya.':'Locally save hua.');
  okEl.style.display='block';
  document.getElementById('imp-data').value='';
  renderTab('kb');
}

function importFile(){
  const f=document.getElementById('imp-file')?.files[0];
  if(!f){toast('Pehle file select karo');return;}
  const r=new FileReader();
  r.onload=async ev=>{
    try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;setKB(d);const ok=await pushUp();toast(ok?'✅ '+d.length+' entries synced!':'✅ '+d.length+' entries imported');renderTab('kb');st('kb');}
    catch{toast('❌ Invalid JSON file');}
  };
  r.readAsText(f);
}

function exportKB(){
  const b=new Blob([JSON.stringify(getKB(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='mmfsl_kb_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

  if(_ron){_rec?.stop();return;}
  _rec=new SR();_rec.lang='hi-IN';_rec.interimResults=false;
  _rec.onresult=e=>{document.getElementById('txta').value=e.results[0][0].transcript;grow(document.getElementById('txta'));};
  _rec.onerror=_rec.onend=()=>{_ron=false;btn.classList.remove('rec');};
  _rec.start();_ron=true;btn.classList.add('rec');
}

/* ==============================================
   TOAST
============================================== */
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600);}
