<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#C0001D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MMFSL">
<title>MMFSL Sales Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:-webkit-fill-available;}
body{position:fixed;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#ECE5DD;}
#shell{position:fixed;inset:0;display:flex;flex-direction:column;background:#ECE5DD;max-width:480px;margin:0 auto;padding-top:env(safe-area-inset-top,0px);}
/* HEADER */
#hdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.hav{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.hname{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{font-size:11px;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:3px;margin-top:1px;}
.odot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.hbtn{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn:active{background:rgba(255,255,255,.18);}
/* MESSAGES */
#msgs{flex:1 1 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 8px 6px;}
#msgs::-webkit-scrollbar{display:none;}
.dc{text-align:center;margin:4px 0 8px;}
.dc span{font-size:11.5px;color:#555;background:rgba(255,255,255,.88);padding:3px 12px;border-radius:7px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.row{display:flex;align-items:flex-end;gap:4px;margin-bottom:3px;}
.row.me{flex-direction:row-reverse;}
.bav{width:26px;height:26px;border-radius:50%;background:#C0001D;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;}
.bbl{max-width:82%;padding:8px 11px 5px;font-size:14.5px;line-height:1.5;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.12);animation:pop .16s ease-out both;}
.bbl.me{background:#C0001D;color:#fff;border-radius:8px 2px 8px 8px;}
.bbl.bot{background:#fff;color:#111;border-radius:2px 8px 8px 8px;}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(4px);}to{opacity:1;transform:none;}}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px;}
.bt{font-size:10px;opacity:.52;white-space:nowrap;}
.bbl.me .bt{color:rgba(255,255,255,.8);}
.bbl.bot .bt{color:#666;}
.btgs{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.btg{font-size:10px;padding:1px 7px;border-radius:20px;background:#fff0f1;color:#C0001D;font-weight:500;}
/* TYPING */
.trow{display:flex;align-items:flex-end;gap:4px;margin-bottom:4px;}
.tbbl{background:#fff;border-radius:2px 8px 8px 8px;padding:10px 14px;display:flex;gap:4px;align-items:center;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.dot{width:7px;height:7px;border-radius:50%;background:#C0001D;}
.dot:nth-child(1){animation:bnc 1.2s 0s infinite;}
.dot:nth-child(2){animation:bnc 1.2s .18s infinite;}
.dot:nth-child(3){animation:bnc 1.2s .36s infinite;}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.3;}30%{transform:translateY(-6px);opacity:1;}}
/* WELCOME */
.wcard{text-align:center;padding:18px 8px 12px;}
.wico{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;}
.wtit{font-size:15px;font-weight:700;color:#1a1a1a;}
.wsub{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}
/* SUGGESTIONS */
#sugs{flex:0 0 auto;display:flex;gap:6px;overflow-x:auto;padding:5px 8px;background:#ECE5DD;border-top:1px solid rgba(0,0,0,.07);}
#sugs::-webkit-scrollbar{display:none;}
.sg{white-space:nowrap;padding:5px 12px;border-radius:18px;border:1.5px solid #C0001D;background:#fff;color:#C0001D;font-size:12.5px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:inherit;}
.sg:active{background:#C0001D;color:#fff;}
/* INPUT BAR */
#ibar{flex:0 0 auto;background:#F0F0F0;border-top:1px solid #d0d0d0;display:flex;align-items:flex-end;gap:6px;padding:7px 8px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));}
#txta{flex:1;min-height:40px;max-height:92px;padding:9px 13px;border-radius:20px;border:none;outline:none;background:#fff;font-size:16px;font-family:inherit;line-height:1.4;color:#111;resize:none;overflow-y:auto;box-shadow:0 1px 2px rgba(0,0,0,.1);-webkit-appearance:none;}
#txta::placeholder{color:#aaa;}
.ibtn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;}
#micbtn{background:#fff;color:#555;box-shadow:0 1px 2px rgba(0,0,0,.12);}
#micbtn.rec{background:#C0001D;color:#fff;}
#sndbtn{background:#C0001D;color:#fff;box-shadow:0 2px 5px rgba(192,0,29,.4);}
#sndbtn:active{background:#8B0015;}
/* SIDE SCREENS */
.sscr{position:fixed;inset:0;max-width:480px;margin:0 auto;display:flex;flex-direction:column;background:#f4f4f4;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;padding-top:env(safe-area-inset-top,0px);}
.sscr.open{transform:none;}
.sscr-hdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.sbk{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* LOGIN */
#lscr{background:#fff;}
.lbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 18px;display:flex;flex-direction:column;align-items:center;gap:18px;}
.llogo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto;}
.ltit{font-size:20px;font-weight:700;color:#111;text-align:center;}
.lsub{font-size:13px;color:#888;text-align:center;line-height:1.5;}
.lform{display:flex;flex-direction:column;gap:12px;width:100%;}
.flbl{font-size:12px;font-weight:600;color:#555;margin-bottom:3px;}
.finp{width:100%;padding:13px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.finp:focus{border-color:#C0001D;background:#fff;}
.lerr{font-size:12.5px;color:#C0001D;text-align:center;display:none;}
.lblogin{width:100%;padding:14px;background:#C0001D;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-appearance:none;}
.lblogin:active{background:#8B0015;}
/* ADMIN */
#abody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:11px;}
#abody::-webkit-scrollbar{display:none;}
#tabs{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 5px;border:none;background:none;color:#bbb;font-family:inherit;cursor:pointer;font-size:9.5px;font-weight:500;}
.tabi{font-size:17px;line-height:1;}
.tab.on{color:#C0001D;}
.card{background:#fff;border-radius:12px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ctit{font-size:13px;font-weight:700;color:#222;margin-bottom:11px;display:flex;align-items:center;gap:6px;}
.cbdg{margin-left:auto;background:#fff0f1;color:#C0001D;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:#fff;border-radius:10px;padding:11px 6px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.sn{font-size:20px;font-weight:700;color:#C0001D;}
.sl{font-size:10px;color:#999;font-weight:500;margin-top:2px;}
.kbl{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.kbl::-webkit-scrollbar{display:none;}
.ki{border:1px solid #eee;border-radius:8px;padding:10px 11px;}
.kq{font-size:12px;font-weight:600;color:#222;margin-bottom:2px;}
.ka{font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ktgs{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.ktg{font-size:10px;padding:1px 6px;border-radius:20px;background:#fff0f1;color:#C0001D;font-weight:500;}
.kact{display:flex;gap:6px;justify-content:flex-end;margin-top:6px;}
.bedit{font-size:11.5px;padding:4px 10px;border-radius:6px;border:none;background:#f0f0f0;color:#444;cursor:pointer;font-family:inherit;}
.bdel{font-size:11.5px;padding:4px 10px;border-radius:6px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-family:inherit;}
.aform{display:flex;flex-direction:column;gap:10px;}
.ainp,.atxt{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.ainp:focus,.atxt:focus{border-color:#C0001D;background:#fff;}
.atxt{min-height:78px;resize:vertical;}
.prirow{display:flex;gap:6px;}
.pribtn{flex:1;padding:7px;border-radius:7px;border:1.5px solid #ddd;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#888;font-family:inherit;}
.pribtn.on{border-color:#C0001D;background:#fff0f1;color:#C0001D;}
.bsub{background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;-webkit-appearance:none;}
.bsub:active{background:#8B0015;}
.bsub:disabled{opacity:.6;}
.bgray{background:#555;}
.bred{background:#dc2626;}
.srchw{position:relative;margin-bottom:10px;}
.sric{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;font-size:13px;pointer-events:none;}
.srinp{padding-left:32px!important;}
.ver{font-size:10.5px;color:#ccc;text-align:center;padding:6px;font-family:monospace;}
.ibox{border-radius:8px;padding:11px 13px;font-size:12.5px;line-height:1.7;margin-bottom:8px;}
.igreen{background:#ecfdf5;color:#065f46;}
.ired{background:#fff0f0;color:#991b1b;}
.iblue{background:#eff6ff;color:#1e3a8a;}
.iblue ol{margin-left:14px;margin-top:4px;}
.iblue a{color:#1d4ed8;}
.iyellow{background:#fffbeb;color:#92400e;}
/* MODAL */
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#mbg.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -4px 20px rgba(0,0,0,.2);}
.mtit{font-size:15px;font-weight:700;color:#111;margin-bottom:14px;}
.mbtns{display:flex;gap:10px;margin-top:14px;}
.bcancel{flex:1;background:#f0f0f0;color:#444;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.bsave{flex:1;background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.empty{text-align:center;padding:20px;color:#bbb;font-size:13px;}
/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(20,20,20,.9);color:#fff;padding:8px 16px;border-radius:18px;font-size:12.5px;font-weight:500;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;max-width:86vw;text-align:center;transition:transform .22s,opacity .22s;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<div id="shell">
  <div id="hdr">
    <div class="hav">&#x1F916;</div>
    <div class="hinfo">
      <div class="hname">MMFSL Sales Assistant</div>
      <div class="hsub"><span class="odot"></span>Online &middot; Mahindra Finance</div>
    </div>
    <button class="hbtn" onclick="openAdmin()">&#x2699;&#xFE0F;</button>
    <button class="hbtn" onclick="clearChat()">&#x1F5D1;&#xFE0F;</button>
  </div>
  <div id="msgs">
    <div class="wcard">
      <div class="wico">&#x1F3E6;</div>
      <div class="wtit">MMFSL Sales Assistant</div>
      <div class="wsub">Loans, pitches, objections — sab Hindi mein. Kuch bhi poochho! &#x1F4BC;</div>
    </div>
    <div class="dc"><span id="dlbl">Aaj</span></div>
  </div>
  <div id="sugs">
    <button class="sg" onclick="useSug(this)">MMFSL kya hai?</button>
    <button class="sg" onclick="useSug(this)">Tractor loan pitch</button>
    <button class="sg" onclick="useSug(this)">Rate objection</button>
    <button class="sg" onclick="useSug(this)">Documents?</button>
    <button class="sg" onclick="useSug(this)">Deal close karo</button>
  </div>
  <div id="ibar">
    <button class="ibtn" id="micbtn" onclick="toggleMic()">&#x1F399;&#xFE0F;</button>
    <textarea id="txta" placeholder="Kuch bhi poochho…" rows="1" oninput="grow(this)" onkeydown="onKey(event)"></textarea>
    <button class="ibtn" id="sndbtn" onclick="doSend()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- LOGIN -->
<div class="sscr" id="lscr">
  <div class="sscr-hdr">
    <button class="sbk" onclick="close_('lscr')">&#x2039;</button>
    <div class="hav">&#x1F512;</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Login</div></div>
  </div>
  <div class="lbody">
    <div class="llogo">&#x1F512;</div>
    <div><div class="ltit">Admin Panel</div><div class="lsub" style="margin-top:4px;">Knowledge base manage karo</div></div>
    <div class="lform">
      <div><div class="flbl">Username</div><input class="finp" id="lu" type="text" placeholder="Username" autocomplete="username"></div>
      <div><div class="flbl">Password</div><input class="finp" id="lp" type="password" placeholder="Password" autocomplete="current-password"></div>
      <div class="lerr" id="lerr">Username ya password galat hai</div>
      <button class="lblogin" onclick="doLogin()">Login karein &#x2192;</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="sscr" id="ascr">
  <div class="sscr-hdr">
    <button class="sbk" onclick="close_('ascr')">&#x2039;</button>
    <div class="hav">&#x1F4DA;</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Panel</div><div style="font-size:11px;color:rgba(255,255,255,.8);" id="asub">Knowledge Base</div></div>
    <button class="hbtn" onclick="doLogout()">&#x1F6AA;</button>
  </div>
  <div id="tabs">
    <button class="tab on" id="tkb" onclick="st('kb')"><div class="tabi">&#x1F4DA;</div>KB</button>
    <button class="tab" id="tadd" onclick="st('add')"><div class="tabi">&#x2795;</div>Add</button>
    <button class="tab" id="tupd" onclick="st('upd')"><div class="tabi">&#x1F4E2;</div>Updates</button>
    <button class="tab" id="timp" onclick="st('imp')"><div class="tabi">&#x1F4E5;</div>Import</button>
    <button class="tab" id="tset" onclick="st('set')"><div class="tabi">&#x2699;&#xFE0F;</div>Settings</button>
  </div>
  <div id="abody"></div>
</div>

<!-- MODAL -->
<div id="mbg" onclick="if(event.target===this)closeMod()">
  <div class="modal">
    <div class="mtit" id="mtit">Edit</div>
    <div id="mbody"></div>
    <div class="mbtns">
      <button class="bcancel" onclick="closeMod()">Cancel</button>
      <button class="bsave" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
/* ===================== KNOWLEDGE BASE ===================== */
const FKB=[
{id:'k01',q:'MMFSL kya hai company ka parichay',a:'Mahindra & Mahindra Financial Services Limited (MMFSL) India ki top NBFCs mein se ek hai — 32 saal se rural aur semi-urban India ki seva. 1 crore+ customers, 1386+ branches, 4 lakh+ gaon mein reach. Mahindra Group ka hissa — wahi Mahindra jo tractor, Scorpio, Bolero banata hai. RBI registered, NSE/BSE listed — bilkul safe.',tags:['company','mmfsl'],pri:'high'},
{id:'k02',q:'MMFSL ke products services kya hain',a:'MMFSL mein sab milta hai: Car Loan (100% funding), Tractor Loan (harvest EMI), Commercial Vehicle Loan, Pre-Owned Vehicle Loan, Personal/Suvidha Loan, Home Loan (9.29% se), SME/Machinery Loan, Fixed Deposit (7.35% — Samruddhi & Dhanvruddhi), Mutual Funds, Insurance. Ek hi jagah sab kuch.',tags:['products','overview'],pri:'high'},
{id:'k03',q:'Car loan pitch features kaise karein',a:'Pitch: "Bhaiya, aaj gadi lo — ek paisa nahi chahiye, 100% MMFSL dega." Features: 100% ex-showroom funding, Maruti/Hyundai/Tata/Mahindra/Renault sab brands, 5 saal tenure, salaried/kisan/trader sab eligible, collateral nahi. Kuch working days mein approval.',tags:['car','loan','pitch'],pri:'high'},
{id:'k04',q:'Car loan documents eligibility kya chahiye',a:'Documents: Aadhaar, PAN, 2 photos, 6 mahine bank statement, income proof — kisan ke liye zameen ke kagaz (ITR zarori nahi). Collateral nahi. Field officer ghar aata hai. Approval kuch working days mein.',tags:['car','documents'],pri:'high'},
{id:'k05',q:'Tractor loan pitch kisan ko kaise samjhayein',a:'Problem: "Kiraye ke tractor mein fasal late hoti hai na?" Solution: "Apna tractor = sahi waqt + fasal zyada + kiraya zero." MMFSL: 90% tak funding, 5 saal tenure, harvest EMI — pehle 6 mahine koi EMI nahi! 2 working days approval. Close: "Aaj kagaz do — parson tractor ghar."',tags:['tractor','kisan','pitch'],pri:'high'},
{id:'k06',q:'Tractor loan eligibility documents brands',a:'Koi bhi kisan eligible — 18-65 saal, kheti karta ho. Documents: Aadhaar, PAN, photos, 6 mahine passbook, zameen ke kagaz — ITR nahi chahiye. Brands: Mahindra, Sonalika, John Deere, TAFE, Eicher, New Holland sab. Doorstep service.',tags:['tractor','eligibility','documents'],pri:'high'},
{id:'k07',q:'Harvest EMI tractor kya hota hai',a:'MMFSL ka sabse bada advantage — Harvest EMI! Pehle 6 mahine koi EMI nahi, pehle fasal aao phir bhar do. Rabi ya Kharif — jis pe kisan depend kare. Yeh feature sirf MMFSL deta hai, banks nahi. Pitch mein hamesha use karo.',tags:['tractor','harvest','emi'],pri:'high'},
{id:'k08',q:'Commercial vehicle truck tempo bus loan',a:'Trucks, tempos, buses, vans sab. LTV 85% tak, 5 saal tenure. Khaas: 6 mahine ka route permit = income proof (ITR nahi chahiye). Pitch: "Apna truck = malik bano. Route permit hai? Bas wahi kaafi hai MMFSL ke liye."',tags:['commercial','truck'],pri:'medium'},
{id:'k09',q:'Purani gaadi second hand pre owned vehicle loan',a:'MMFSL purani/second-hand car pe bhi loan deta hai! Purani Maruti, Honda, Hyundai pe bhi. Pitch: "Budget mein purani Swift lo — EMI Rs.5,000 se. MMFSL loan dega." Pre-owned mein bhi doorstep service.',tags:['pre-owned','used','purani'],pri:'medium'},
{id:'k10',q:'Personal loan suvidha loan kya hai',a:'Personal loan Rs.50,000-15 lakh, digital, kuch ghante mein approve. Suvidha Loan: existing MMFSL customers ke liye pre-approved, vehicle asset pe secured, poori tarah online. Pehle se MMFSL customer? Seedha Suvidha offer karo. Helpline: 1800-233-1234.',tags:['personal','suvidha'],pri:'medium'},
{id:'k11',q:'Home loan ghar ke liye',a:'MMFSL home loan rural/semi-urban India ke liye. Rate 9.29% se shuru, minimal docs. Pitch: "Pucca ghar banana hai? MMFSL kar dega." Branch ya 1800-233-1234.',tags:['home','ghar'],pri:'medium'},
{id:'k12',q:'SME business loan machinery vyapaar dukaan',a:'SME options: Business Loan, Machinery Loan (naya/purana), Loan Against Property. Pitch: "Dukaan badhani hai? MMFSL 2 din mein decision — bank se fast, kam kagaz." 2 saal purana business, basic docs.',tags:['sme','business','machinery'],pri:'medium'},
{id:'k13',q:'Fixed deposit FD Samruddhi Dhanvruddhi invest',a:'2 FD schemes: Samruddhi (regular interest) aur Dhanvruddhi (cumulative). Rate 7.35% tak — bank se zyada! CRISIL/ICRA AAA rated. Senior citizens +0.35%. Rs.5,000 se shuru, 12-60 mahine. Pitch: "Bank se zyada return, Mahindra ka naam."',tags:['fd','invest','samruddhi'],pri:'medium'},

/* ===================== GOOGLE SCRIPT SYNC ===================== */
// URL baked in — all phones sync automatically
const GAS_URL='https://script.google.com/macros/s/AKfycbwOSqWxWBje8ESVZ9SAjybltMGMJxrQX1IqNqi0xNvwVaTDyBjaHcyQ13AsSvi-ROX1Sw/exec';

function fullData(){return{kb:getKB(),upds:getUpds(),v:Date.now()};}
function applyData(d){if(d&&d.kb)setKB(d.kb);if(d&&d.upds)setUpds(d.upds);}

function syncDown(){
  fetch(GAS_URL+'?action=read',{signal:AbortSignal.timeout(8000)})
    .then(r=>r.ok?r.json():null)
    .then(d=>{if(d&&d.kb)applyData(d);})
    .catch(()=>{});
}

async function pushUp(){
  try{
    const r=await fetch(GAS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'write',data:fullData()}),
      signal:AbortSignal.timeout(10000)
    });
    return r.ok;
  }catch{return false;}
}

// Intent detection — maps user input to a flow OR direct answer
function detectIntent(lo){
  // Insurance
  if(lo.includes('insurance')||lo.includes('bima')||lo.includes('insure')) return 'insurance_pitch';
  // Loan pitch (generic)
  if((lo.includes('pitch')&&!lo.includes('object'))||(lo.includes('kaise becho'))||(lo.includes('kaise samjhao'))||(lo.includes('kaise karein')&&lo.includes('loan'))) return 'loan_pitch';
  // Objections
  if(lo.includes('objection')||lo.includes('object')||(lo.includes('customer')+lo.includes('bol'))>0&&(lo.includes('nahi')||lo.includes('nai'))) return 'objection';
  // Documents
  if(lo.includes('document')||lo.includes('kagaz')||lo.includes('kya chahiye')||lo.includes('kya lagega')) return 'documents';
  // EMI
  if((lo.includes('emi')||lo.includes('installment')||lo.includes('kitni hogi'))&&!lo.includes('harvest')) return 'emi';
  // FD
  if(lo.includes(' fd ')||lo.includes('fixed deposit')||lo.includes('samruddhi')||lo.includes('dhanvruddhi')||lo.startsWith('fd')) return 'fd';
  return null;
}

function findAnswer(input){
  const lo=input.toLowerCase().trim();

  // 1. If we are waiting for a follow-up reply, handle it
  if(_state.waiting){
    const flow=FLOWS[_state.waiting];
    _state.waiting=null;
    const result=flow.handle(input);
    return result;
  }

  // 2. Check for updates (admin posted)
  for(const u of getUpds()){
    const words=lo.split(/\s+/).filter(w=>w.length>1);
    if(words.some(w=>u.title.toLowerCase().includes(w)||u.body.toLowerCase().includes(w)||(u.tags||[]).some(t=>t.toLowerCase().includes(w))))
      return{a:'📢 Nayi update: '+u.title+'\n\n'+u.body,t:u.tags||[]};
  }

  // 3. Detect intent — start a flow if needed
  const intent=detectIntent(lo);
  if(intent&&FLOWS[intent]){
    _state.waiting=intent;
    _state.context={};
    const flow=FLOWS[intent];
    // Show quick chips
    setTimeout(()=>showFlowChips(flow.chips),50);
    return{a:flow.ask,t:[]};
  }

  // 4. Direct keyword patterns (no follow-up needed)
  // Specific vehicle + loan combos — answer directly
  if(lo.includes('tractor')&&(lo.includes('loan')||lo.includes('pitch')||lo.includes('becho'))) return FLOWS.loan_pitch.handle('tractor');
  if(lo.includes('car')&&(lo.includes('loan')||lo.includes('pitch'))) return FLOWS.loan_pitch.handle('car');
  if((lo.includes('truck')||lo.includes('tempo'))&&lo.includes('loan')) return FLOWS.loan_pitch.handle('truck');
  if((lo.includes('sme')||lo.includes('business'))&&lo.includes('loan')) return FLOWS.loan_pitch.handle('business');
  if(lo.includes('home')&&lo.includes('loan')) return FLOWS.loan_pitch.handle('home');
  if((lo.includes('tractor')&&lo.includes('emi'))||lo.includes('harvest emi')) return FLOWS.emi.handle('tractor');
  if(lo.includes('car')&&lo.includes('emi')) return FLOWS.emi.handle('car');

  // Rate/byaj objection
  if(lo.includes('byaj')||lo.includes('rate zyada')||(lo.includes('rate')&&lo.includes('objection'))) return FLOWS.objection.handle('rate');
  // Trust objection
  if((lo.includes('trust')||lo.includes('bharosa'))&&(lo.includes('nahi')||lo.includes('objection'))) return FLOWS.objection.handle('trust');
  // Budget objection
  if((lo.includes('paisa nahi')||lo.includes('budget nahi'))) return FLOWS.objection.handle('paisa');
  // Bank objection
  if(lo.includes('bank')&&lo.includes('objection')) return FLOWS.objection.handle('bank');

  // 5. KB entries
  const words=lo.split(/\s+/).filter(w=>w.length>1);
  let kb2=null,ks=0;
  for(const e of getKB()){
    let sc=0;
    for(const w of words){
      if(w.length<2)continue;
      if(e.q.toLowerCase().includes(w))sc+=4;
      if(e.a.toLowerCase().includes(w))sc+=1;
      if((e.tags||[]).some(t=>t.toLowerCase().includes(w)))sc+=3;
      // trigger words get highest priority
      if((e.triggers||[]).some(t=>lo.includes(t.toLowerCase())))sc+=10;
    }
    // also check full trigger phrases
    if((e.triggers||[]).some(t=>lo.includes(t.toLowerCase())))sc+=10;
    if(e.pri==='high')sc*=1.3;
    if(sc>ks){ks=sc;kb2=e;}
  }
  if(kb2&&ks>1)return{a:kb2.a,t:kb2.tags||[]};

  // 6. Pattern match
  let best=null,bs=0;
  for(const p of PAT){
    let sc=0;
    for(const kw of p.kw){if(lo.includes(kw))sc+=kw.length*2;}
    if(sc>bs){bs=sc;best=p;}
  }
  if(best&&bs>4)return{a:best.a,t:best.t};

  // 7. Fallback
  return{a:'Seedha batao kya chahiye:\n\n• Insurance pitch → kaunsa vehicle?\n• Loan pitch → kaunsa loan?\n• Objection handle → kaunsa objection?\n• Documents → kaunse loan ke?\n• EMI → kaunse loan ki?\n• FD ke baare mein?\n\nYa fir koi bhi sawaal poochho!',t:[]};
}

function doSend(){

  const el=document.getElementById('txta');

  _busy=true;el.value='';el.style.height='';el.blur();

function addBubble(text,who,tags=[]){
  const wrap=document.getElementById('msgs');
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  const row=document.createElement('div');row.className='row '+who;
  const tH=tags.length?`<div class="btgs">${tags.slice(0,3).map(t=>`<span class="btg">${t}</span>`).join('')}</div>`:'';
  const meta=`<div class="bmeta"><span class="bt">${now}</span></div>`;
  if(who==='me')row.innerHTML=`<div class="bbl me">${esc(text)}${meta}</div>`;
  else row.innerHTML=`<div class="bav">M</div><div class="bbl bot">${fmt(text)}${tH}${meta}</div>`;
  wrap.appendChild(row);
  requestAnimationFrame(()=>{wrap.scrollTop=wrap.scrollHeight;});
}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/✓/g,'<span style="color:#16a34a">✓</span>').replace(/\n/g,'<br>');}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTyping(){if(_typ)return;const w=document.getElementById('msgs');_typ=document.createElement('div');_typ.className='trow';_typ.innerHTML='<div class="bav">M</div><div class="tbbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';w.appendChild(_typ);requestAnimationFrame(()=>{w.scrollTop=w.scrollHeight;});}
function hideTyping(){if(_typ){_typ.remove();_typ=null;}}
function clearChat(){const w=document.getElementById('msgs');while(w.children.length>2)w.removeChild(w.lastChild);_busy=false;_typ=null;_state={waiting:null,context:{}};hideTyping();toast('Chat saaf ho gayi');setTimeout(()=>addBubble('Nayi baat shuru karte hain! Kuch bhi poochho. 💼','bot',[]),300);}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,92)+'px';}
function useSug(btn){if(_busy)return;document.getElementById('txta').value=btn.textContent;doSend();}
const SUGS={tractor:['Harvest EMI?','Eligibility?','Kaunse brands?','Close karo'],car:['100% funding?','Purani gaadi?','Documents?','EMI kitni?'],sme:['Machinery loan?','Process?','Eligibility?'],obj:['Bank compare','Trust objection','Budget objection','Deal close'],def:['MMFSL kya hai?','Tractor loan pitch','Rate objection','Documents?','Deal close karo']};

        <div style="font-size:10px;color:#bbb;margin-top:3px;">${new Date(u.ts).toLocaleString('en-IN')}</div>
        <div class="kact"><button class="bdel" onclick="delUpd('${u.id}')">Delete &amp; Sync</button></div>
      </div>`).join('')}</div></div>`:'<div class="empty">Koi updates nahi hain abhi</div>';
    body.innerHTML=`
    <div class="card"><div class="ctit">Daily Update Post Karo</div>
    <div style="font-size:12px;color:#666;margin-bottom:10px;line-height:1.6;">Yahan post karo — <strong>sab ke phone mein 30 sec mein aa jaata hai.</strong></div>
    <div class="aform">
      <div><div class="flbl">Title *</div><input class="ainp" id="ut" placeholder="e.g. Naya tractor scheme launch hua"></div>
      <div><div class="flbl">Details *</div><textarea class="atxt" id="ub" placeholder="Rate, eligibility, last date…"></textarea></div>
      <div><div class="flbl">Tags</div><input class="ainp" id="utg" placeholder="tractor,scheme"></div>
      <button class="bsub" id="upd-btn" onclick="addUpd()">📢 Post &amp; Sync to All Phones</button>

  }

  else if(t==='imp'){
    body.innerHTML=`
    <div class="card"><div class="ctit">📋 Excel se Bulk Import</div>
    <div class="ibox iblue" style="margin-bottom:10px;font-size:12px;">
      <strong>Kaise karein:</strong>
      <ol style="margin-left:14px;margin-top:4px;line-height:1.9;">
        <li>Excel mein 4 columns banao: <code style="background:#dbeafe;padding:1px 4px;border-radius:3px;">question</code> &nbsp;<code style="background:#dbeafe;padding:1px 4px;border-radius:3px;">answer</code> &nbsp;<code style="background:#dbeafe;padding:1px 4px;border-radius:3px;">tags</code> &nbsp;<code style="background:#dbeafe;padding:1px 4px;border-radius:3px;">priority</code></li>
        <li>Row 1 mein yahi column names likhо</li>
        <li>Neeche apna data bharo (ek row = ek pitch)</li>
        <li>Sab select karo → <strong>Ctrl+C</strong></li>
        <li>Neeche box mein <strong>Ctrl+V</strong> se paste karo</li>
        <li><strong>Import &amp; Sync</strong> dabao — ho gaya!</li>

    </div>
    <div class="ibox iyellow" style="margin-bottom:10px;font-size:12px;">
      <strong>Tags example:</strong> tractor,pitch,kisan &nbsp;|&nbsp; <strong>Priority:</strong> high / medium / low
    </div>
    <div class="aform">
      <div>
        <div class="flbl">Excel data yahan paste karo (Ctrl+V)</div>
        <textarea class="atxt" id="imp-data" style="min-height:130px;font-size:13px;" placeholder="question	answer	tags	priority
Tractor loan pitch kya hai	Bhaiya aaj tractor lo...	tractor,pitch	high
Car loan kaise becho	100% funding milti hai...	car,pitch	high"></textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="bsub" id="imp-btn" onclick="doImport()" style="flex:1;">📥 Import &amp; Sync</button>

/* ===================== KB ACTIONS ===================== */
function kbHTML(kb){
  if(!kb.length)return'<div class="empty">No entries</div>';
  return kb.map(e=>`<div class="ki" id="ki_${e.id}">
    <div class="kq">${e.q}</div>
    <div class="ka">${(e.a||'').substring(0,80)}…</div>
    ${(e.triggers||[]).length?`<div style="margin-top:4px;font-size:10.5px;color:#666;">🎯 Triggers: <span style="color:#C0001D;">${(e.triggers||[]).join(', ')}</span></div>`:'<div style="margin-top:4px;font-size:10.5px;color:#e97316;">⚠️ No triggers set — bot may not find this</div>'}
    <div class="ktgs">${(e.tags||[]).map(t=>`<span class="ktg">${t}</span>`).join('')}</div>
    <div class="kact">
      <button class="bedit" onclick="testEntry('${e.id}')" style="background:#ecfdf5;color:#065f46;">🧪 Test</button>
      <button class="bedit" onclick="openEdit('${e.id}')">✏️ Edit</button>
      <button class="bdel" onclick="delEntry('${e.id}')">🗑️</button>
    </div>
  </div>`).join('');}

function testEntry(id){
  const e=getKB().find(x=>x.id===id);if(!e)return;
  const triggers=(e.triggers||[]);
  const testWord=triggers.length?triggers[0]:e.q.split(' ')[0];
  const result=findAnswer(testWord);
  const matched=(result.a===e.a);
  toast(matched?'✅ Found! "'+testWord+'" → yeh entry milti hai':'❌ "'+testWord+'" → entry nahi mili. Triggers add karo.');
}
function filterKB(q){const lo=q.toLowerCase();const f=getKB().filter(e=>e.q.toLowerCase().includes(lo)||e.a.toLowerCase().includes(lo)||(e.tags||[]).join(' ').includes(lo));document.getElementById('kbl').innerHTML=kbHTML(f);}
function setPri(v,btn){_pri=v;document.querySelectorAll('.prirow .pribtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function addTag(t){const el=document.getElementById('nt');if(!el)return;const c=el.value.split(',').map(x=>x.trim()).filter(Boolean);if(!c.includes(t))el.value=[...c,t].join(', ');}

async function addEntry(){
  const q=document.getElementById('nq').value.trim();
  const a=document.getElementById('na').value.trim();
  if(!q||!a){toast('Question aur Jawab dono fill karo');return;}
  const triggers=document.getElementById('ntr')?.value.split(',').map(x=>x.trim()).filter(Boolean)||[];
  const tags=document.getElementById('nt').value.split(',').map(x=>x.trim()).filter(Boolean);
  if(!triggers.length){toast('⚠️ Trigger words bhi daalo — warna bot entry nahi dhoondh payega');return;}
  const kb=getKB();
  kb.push({id:'k'+Date.now(),q,a,triggers,tags,pri:_pri||'medium',ts:Date.now()});
  setKB(kb);
  const btn=document.getElementById('add-btn');btn.textContent='Syncing…';btn.disabled=true;
  const ok=await pushUp();btn.textContent='+ Add & Sync to All Phones';btn.disabled=false;
  toast(ok?'✅ Added & synced!':'✅ Added (sync pending)');
  st('kb');
}
async function delEntry(id){setKB(getKB().filter(e=>e.id!==id));document.getElementById('ki_'+id)?.remove();await pushUp();toast('Deleted & synced');}
function openEdit(id){
  const e=getKB().find(x=>x.id===id);if(!e)return;
  _eid=id;
  document.getElementById('mtit').textContent='Edit Entry';
  document.getElementById('mbody').innerHTML=`
  <div class="aform">
    <div><div class="flbl">Question</div><input class="ainp" id="eq" value="${e.q.replace(/"/g,'&quot;')}"></div>
    <div><div class="flbl">Jawab</div><textarea class="atxt" id="ea">${e.a}</textarea></div>
    <div>
      <div class="flbl">🎯 Trigger Words <span style="font-weight:400;color:#888;">(user yahi type kare)</span></div>
      <input class="ainp" id="etr" value="${(e.triggers||[]).join(', ')}" placeholder="e.g. gold,sona,gold loan">
      <div style="font-size:11px;color:#888;margin-top:3px;">Comma se alag karo — jo bhi user type kare yeh entry milne ke liye</div>
    </div>
    <div><div class="flbl">Tags</div><input class="ainp" id="et" value="${(e.tags||[]).join(', ')}"></div>
    <div><div class="flbl">Priority</div>
      <div class="prirow">${['low','medium','high'].map(p=>`<button class="pribtn${(e.pri||'medium')===p?' on':''}" onclick="setPri('${p}',this)">${p[0].toUpperCase()+p.slice(1)}</button>`).join('')}</div>
    </div>
  </div>`;
  _pri=e.pri||'medium';
  document.getElementById('mbg').classList.add('open');
}
async function saveEdit(){
  const kb=getKB();const i=kb.findIndex(e=>e.id===_eid);if(i<0)return;
  kb[i].q=document.getElementById('eq').value.trim();
  kb[i].a=document.getElementById('ea').value.trim();
  kb[i].triggers=document.getElementById('etr')?.value.split(',').map(t=>t.trim()).filter(Boolean)||kb[i].triggers||[];
  kb[i].tags=document.getElementById('et').value.split(',').map(t=>t.trim()).filter(Boolean);
  kb[i].pri=_pri||kb[i].pri;
  setKB(kb);closeMod();
  const ok=await pushUp();
  toast(ok?'✅ Saved & synced!':'Saved (sync pending)');
  renderTab('kb');
}
function closeMod(){document.getElementById('mbg').classList.remove('open');}

async function addUpd(){
  const title=document.getElementById('ut').value.trim();const body=document.getElementById('ub').value.trim();
  if(!title||!body){toast('Title aur Details fill karo');return;}
  const tags=document.getElementById('utg').value.split(',').map(t=>t.trim()).filter(Boolean);
  const upds=getUpds();upds.push({id:'u'+Date.now(),title,body,tags,ts:Date.now()});setUpds(upds);
  const btn=document.getElementById('upd-btn');btn.textContent='Syncing…';btn.disabled=true;
  const ok=await pushUp();btn.textContent='📢 Post & Sync to All Phones';btn.disabled=false;
  toast(ok?'📢 Posted & synced!':'Posted (sync pending)');renderTab('upd');
}
async function delUpd(id){setUpds(getUpds().filter(u=>u.id!==id));await pushUp();toast('Deleted & synced');renderTab('upd');}
function saveCreds(){const u=document.getElementById('nuu').value.trim();const p=document.getElementById('nup').value;if(!u){toast('Username required');return;}const c=getCfg();c.user=u;if(p)c.pass=p;saveCfg(c);toast('✅ Updated!');}

/* ===================== IMPORT / EXPORT ===================== */
function loadSample(){
  const el=document.getElementById('imp-data');if(!el)return;
  el.value='question\tanswer\ttags\tpriority\nTractor loan pitch kya hai\tBhaiya pehle problem poochho: "Kiraye ke tractor mein fasal late hoti hai?" Phir: "Apna tractor = sahi waqt, fasal zyada, kiraya zero." MMFSL: 90% funding, harvest EMI — 6 mahine koi EMI nahi, 2 din approval.\ttractor,pitch,kisan\thigh\nCar loan pitch kaise karein\t"Bhaiya aaj gadi lo — ek paisa nahi chahiye, 100% MMFSL dega." 100% ex-showroom, Maruti/Hyundai/Tata sab, 5 saal tenure, collateral nahi.\tcar,pitch\thigh\nRate zyada hai objection\t"Bhaiya rate se zyada faida dekho. Tractor EMI Rs.11,000 — lekin fasal Rs.2-3 lakh zyada hogi. EMI ek hafte mein nikal aayi!" Phir poochho kaunsi bank ne kam diya.\tobjection,rate\thigh\nTrust nahi objection\t"Bhaiya yeh wahi Mahindra hai jiska tractor aapke khet mein chal raha hai — 32 saal purani, NSE/BSE listed, 1 crore+ customers."\tobjection,trust\thigh';
}

async function doImport(){
  const raw=document.getElementById('imp-data')?.value.trim();
  const okEl=document.getElementById('imp-ok');const errEl=document.getElementById('imp-err');
  okEl.style.display='none';errEl.style.display='none';
  if(!raw){errEl.textContent='Kuch paste nahi kiya!';errEl.style.display='block';return;}
  const lines=raw.split('\n').filter(l=>l.trim());
  const firstLow=lines[0].toLowerCase();
  const dataLines=(firstLow.includes('question')||firstLow.includes('sawaal'))?lines.slice(1):lines;
  if(!dataLines.length){errEl.textContent='Koi data nahi mila.';errEl.style.display='block';return;}
  const entries=[];let skipped=0;
  dataLines.forEach((line,i)=>{
    const parts=line.split('\t');
    if(parts.length<2){skipped++;return;}
    const q=(parts[0]||'').trim();const a=(parts[1]||'').trim();
    if(!q||!a){skipped++;return;}
    const tagsRaw=(parts[2]||'').trim();
    const priRaw=(parts[3]||'medium').trim().toLowerCase();
    const tags=tagsRaw?tagsRaw.split(/[,;]/).map(t=>t.trim()).filter(Boolean):[];
    const pri=['high','medium','low'].includes(priRaw)?priRaw:'medium';
    entries.push({id:'imp_'+Date.now()+'_'+i,q,a,tags,pri,ts:Date.now()});
  });
  if(!entries.length){errEl.textContent='Valid entries nahi mili. Excel mein Tab se columns alag hone chahiye.';errEl.style.display='block';return;}
  const btn=document.getElementById('imp-btn');btn.textContent='Syncing…';btn.disabled=true;
  const merged=[...getKB(),...entries];setKB(merged);
  const ok=await pushUp();
  btn.textContent='📥 Import & Sync';btn.disabled=false;
  okEl.innerHTML='<strong>✅ '+entries.length+' entries import ho gayi!</strong>'+(skipped?' ('+skipped+' rows skip hue)':'')+'<br>'+(ok?'Cloud sync ho gaya — sab phones pe aa gaya.':'Locally save hua.');
  okEl.style.display='block';
  document.getElementById('imp-data').value='';
  renderTab('kb');
}

function importFile(){
  const f=document.getElementById('imp-file')?.files[0];
  if(!f){toast('Pehle file select karo');return;}
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))throw new Error();
      setKB(d);const ok=await pushUp();
      toast(ok?'✅ '+d.length+' entries synced!':'✅ '+d.length+' entries imported');
      renderTab('kb');st('kb');
    }catch{toast('❌ Invalid JSON file');}
  };
  r.readAsText(f);
}

function exportKB(){
  const b=new Blob([JSON.stringify(getKB(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='mmfsl_kb_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

/* ===================== VOICE ===================== */
let _rec=null,_ron=false;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice aapke browser mein nahi');return;}
  const btn=document.getElementById('micbtn');
  if(_ron){_rec?.stop();return;}
  _rec=new SR();_rec.lang='hi-IN';_rec.interimResults=false;
  _rec.onresult=e=>{document.getElementById('txta').value=e.results[0][0].transcript;grow(document.getElementById('txta'));};
  _rec.onerror=_rec.onend=()=>{_ron=false;btn.classList.remove('rec');};
  _rec.start();_ron=true;btn.classList.add('rec');
}

/* ===================== TOAST ===================== */
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600);}

/* ===================== INIT ===================== */
window.addEventListener('DOMContentLoaded',()=>{
  const d=new Date();
  const days=['Ravivar','Somvar','Mangalvar','Budhvar','Guruvar','Shukravar','Shanivar'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dlbl').textContent=days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()];

  // Sync in background — never blocks the app
  setTimeout(syncDown, 1000);
  setInterval(syncDown, 30000);

  // Boot message
  setTimeout(()=>addBubble('Namaste! 🙏 Main aapka MMFSL Sales Assistant hoon.\n\nTractor loan, car loan, FD, objections — sab Hindi mein. Poochho kuch bhi!','bot',[]),300);

  // iOS keyboard fix
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      document.getElementById('shell').style.height=window.visualViewport.height+'px';
    });
  }
});
</script>
