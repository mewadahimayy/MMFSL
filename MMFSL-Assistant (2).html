<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#C0001D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MMFSL">
<title>MMFSL Sales Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;height:-webkit-fill-available;}
body{position:fixed;width:100%;height:100%;height:-webkit-fill-available;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#ECE5DD;}
#shell{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:#ECE5DD;max-width:480px;margin:0 auto;padding-top:env(safe-area-inset-top,0px);}
#hdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:10;}
.hav{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.hname{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{font-size:11px;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:3px;margin-top:1px;}
.odot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.hbtn{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn:active{background:rgba(255,255,255,.18);}
#setup-banner{display:none!important;}
#msgs{flex:1 1 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 8px 6px;}
#msgs::-webkit-scrollbar{display:none;}
.dc{text-align:center;margin:4px 0 8px;}
.dc span{font-size:11.5px;color:#555;background:rgba(255,255,255,.88);padding:3px 12px;border-radius:7px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.row{display:flex;align-items:flex-end;gap:4px;margin-bottom:3px;}
.row.me{flex-direction:row-reverse;}
.bav{width:26px;height:26px;border-radius:50%;background:#C0001D;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;}
.bbl{max-width:82%;padding:8px 11px 5px;font-size:14.5px;line-height:1.5;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.12);animation:pop .16s ease-out both;}
.bbl.me{background:#C0001D;color:#fff;border-radius:8px 2px 8px 8px;}
.bbl.bot{background:#fff;color:#111;border-radius:2px 8px 8px 8px;}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(4px);}to{opacity:1;transform:none;}}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px;}
.bt{font-size:10px;opacity:.52;white-space:nowrap;}
.bbl.me .bt{color:rgba(255,255,255,.85);}
.bbl.bot .bt{color:#666;}
.btgs{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.btg{font-size:10px;padding:1px 7px;border-radius:20px;background:#fff0f1;color:#C0001D;font-weight:500;}
.trow{display:flex;align-items:flex-end;gap:4px;margin-bottom:4px;}
.tbbl{background:#fff;border-radius:2px 8px 8px 8px;padding:10px 14px;display:flex;gap:4px;align-items:center;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.dot{width:7px;height:7px;border-radius:50%;background:#C0001D;}
.dot:nth-child(1){animation:bnc 1.2s 0s infinite;}
.dot:nth-child(2){animation:bnc 1.2s .18s infinite;}
.dot:nth-child(3){animation:bnc 1.2s .36s infinite;}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.3;}30%{transform:translateY(-6px);opacity:1;}}
.wcard{text-align:center;padding:18px 8px 12px;}
.wico{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;}
.wtit{font-size:15px;font-weight:700;color:#1a1a1a;}
.wsub{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}
#sugs{flex:0 0 auto;display:flex;gap:6px;overflow-x:auto;padding:5px 8px;background:#ECE5DD;border-top:1px solid rgba(0,0,0,.07);}
#sugs::-webkit-scrollbar{display:none;}
.sg{white-space:nowrap;padding:5px 12px;border-radius:18px;border:1.5px solid #C0001D;background:#fff;color:#C0001D;font-size:12.5px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:inherit;}
.sg:active{background:#C0001D;color:#fff;}
#ibar{flex:0 0 auto;background:#F0F0F0;border-top:1px solid #d0d0d0;display:flex;align-items:flex-end;gap:6px;padding:7px 8px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));}
#txta{flex:1;min-height:40px;max-height:92px;padding:9px 13px;border-radius:20px;border:none;outline:none;background:#fff;font-size:16px;font-family:inherit;line-height:1.4;color:#111;resize:none;overflow-y:auto;box-shadow:0 1px 2px rgba(0,0,0,.1);-webkit-appearance:none;}
#txta::placeholder{color:#aaa;}
.ibtn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;}
#micbtn{background:#fff;color:#555;box-shadow:0 1px 2px rgba(0,0,0,.12);}
#micbtn.rec{background:#C0001D;color:#fff;}
#sndbtn{background:#C0001D;color:#fff;box-shadow:0 2px 5px rgba(192,0,29,.4);}
#sndbtn:active{background:#8B0015;}
.sscr{position:fixed;inset:0;max-width:480px;margin:0 auto;display:flex;flex-direction:column;background:#f4f4f4;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;padding-top:env(safe-area-inset-top,0px);}
.sscr.open{transform:none;}
.sscr-hdr{flex:0 0 auto;background:#C0001D;display:flex;align-items:center;gap:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.sbk{width:36px;height:36px;border-radius:50%;border:none;background:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbk:active{background:rgba(255,255,255,.18);}
#login-scr{background:#fff;}
.lbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 18px;display:flex;flex-direction:column;align-items:center;gap:18px;}
.llogo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#C0001D,#8B0015);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto;}
.ltit{font-size:20px;font-weight:700;color:#111;text-align:center;}
.lsub{font-size:13px;color:#888;text-align:center;line-height:1.5;margin-top:3px;}
.lform{display:flex;flex-direction:column;gap:12px;width:100%;}
.flbl{font-size:12px;font-weight:600;color:#555;margin-bottom:3px;}
.finp{width:100%;padding:13px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.finp:focus{border-color:#C0001D;background:#fff;}
.lerr{font-size:12.5px;color:#C0001D;text-align:center;display:none;}
.lblogin{width:100%;padding:14px;background:#C0001D;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-appearance:none;}
.lblogin:active{background:#8B0015;}
#adm-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:11px;}
#adm-body::-webkit-scrollbar{display:none;}
#tabs{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 5px;border:none;background:none;color:#bbb;font-family:inherit;cursor:pointer;font-size:10px;font-weight:500;}
.tabi{font-size:18px;line-height:1;}
.tab.on{color:#C0001D;}
.card{background:#fff;border-radius:12px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ctit{font-size:13px;font-weight:700;color:#222;margin-bottom:11px;display:flex;align-items:center;gap:6px;}
.cbdg{margin-left:auto;background:#fff0f1;color:#C0001D;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:#fff;border-radius:10px;padding:11px 6px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.sn{font-size:20px;font-weight:700;color:#C0001D;}
.sl{font-size:10px;color:#999;font-weight:500;margin-top:2px;}
.kbl{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.kbl::-webkit-scrollbar{display:none;}
.ki{border:1px solid #eee;border-radius:8px;padding:10px 11px;}
.kq{font-size:12px;font-weight:600;color:#222;margin-bottom:2px;}
.ka{font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ktgs{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.ktg{font-size:10px;padding:1px 6px;border-radius:20px;background:#fff0f1;color:#C0001D;font-weight:500;}
.kact{display:flex;gap:6px;justify-content:flex-end;margin-top:6px;}
.bedit{font-size:11.5px;padding:4px 10px;border-radius:6px;border:none;background:#f0f0f0;color:#444;cursor:pointer;font-family:inherit;}
.bdel{font-size:11.5px;padding:4px 10px;border-radius:6px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-family:inherit;}
.aform{display:flex;flex-direction:column;gap:10px;}
.ainp,.atxt{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;background:#fafafa;color:#111;outline:none;-webkit-appearance:none;}
.ainp:focus,.atxt:focus{border-color:#C0001D;background:#fff;}
.atxt{min-height:78px;resize:vertical;}
.prirow{display:flex;gap:6px;}
.pribtn{flex:1;padding:7px;border-radius:7px;border:1.5px solid #ddd;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#888;font-family:inherit;}
.pribtn.on{border-color:#C0001D;background:#fff0f1;color:#C0001D;}
.bsub{background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;-webkit-appearance:none;}
.bsub:active,.bsub:disabled{background:#8B0015;opacity:.8;}
.bgray{background:#555;}
.bred{background:#dc2626;}
.srchw{position:relative;margin-bottom:10px;}
.sric{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;font-size:13px;pointer-events:none;}
.srinp{padding-left:32px!important;}
.eyewrap{position:relative;}
.eyebtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:13px;color:#bbb;}
.ver{font-size:10.5px;color:#ccc;text-align:center;padding:6px;font-family:monospace;}
.info-box{border-radius:8px;padding:11px 13px;font-size:12.5px;line-height:1.7;margin-bottom:2px;}
.info-green{background:#ecfdf5;color:#065f46;}
.info-red{background:#fff3e0;color:#92400e;}
.info-blue{background:#eff6ff;color:#1e3a8a;}
.info-blue ol{margin-left:16px;margin-top:6px;}
.info-blue a{color:#1d4ed8;}
.info-blue strong{color:#1e3a8a;}
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
#mbg.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -4px 20px rgba(0,0,0,.2);}
.mtit{font-size:15px;font-weight:700;color:#111;margin-bottom:14px;}
.mbtns{display:flex;gap:10px;margin-top:14px;}
.bcancel{flex:1;background:#f0f0f0;color:#444;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.bsave{flex:1;background:#C0001D;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.empty{text-align:center;padding:20px;color:#bbb;font-size:13px;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(20,20,20,.9);color:#fff;padding:8px 16px;border-radius:18px;font-size:12.5px;font-weight:500;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;max-width:86vw;text-align:center;transition:transform .22s,opacity .22s;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div id="shell">
  <div id="hdr">
    <div class="hav">&#x1F916;</div>
    <div class="hinfo">
      <div class="hname">MMFSL Sales Assistant</div>
      <div class="hsub"><span class="odot"></span><span id="sync-lbl">Starting…</span></div>
    </div>
    <button class="hbtn" onclick="openAdmin()">&#x2699;&#xFE0F;</button>
    <button class="hbtn" onclick="clearChat()">&#x1F5D1;&#xFE0F;</button>
  </div>
  <div id="setup-banner"></div>
  <div id="msgs">
    <div class="wcard">
      <div class="wico">&#x1F3E6;</div>
      <div class="wtit">MMFSL Sales Assistant</div>
      <div class="wsub">Loans, pitches, objections — sab Hindi mein. Kuch bhi poochho! 💼</div>
    </div>
    <div class="dc"><span id="dlbl">Aaj</span></div>
  </div>
  <div id="sugs">
    <button class="sg" onclick="useSug(this)">MMFSL kya hai?</button>
    <button class="sg" onclick="useSug(this)">Tractor loan pitch</button>
    <button class="sg" onclick="useSug(this)">Rate objection</button>
    <button class="sg" onclick="useSug(this)">Documents?</button>
    <button class="sg" onclick="useSug(this)">Deal close karo</button>
  </div>
  <div id="ibar">
    <button class="ibtn" id="micbtn" onclick="toggleMic()">&#x1F399;&#xFE0F;</button>
    <textarea id="txta" placeholder="Kuch bhi poochho…" rows="1" oninput="grow(this)" onkeydown="onKey(event)"></textarea>
    <button class="ibtn" id="sndbtn" onclick="doSend()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- LOGIN -->
<div class="sscr" id="login-scr">
  <div class="sscr-hdr">
    <button class="sbk" onclick="closeScreen('login-scr')">&#x2039;</button>
    <div class="hav">&#x1F512;</div>
    <div class="hinfo"><div class="hname" style="color:#fff">Admin Login</div></div>
  </div>
  <div class="lbody">
    <div class="llogo">&#x1F512;</div>
    <div><div class="ltit">Admin Panel</div><div class="lsub">Knowledge base manage karo</div></div>
    <div class="lform">
      <div><div class="flbl">Username</div><input class="finp" id="luser" type="text" placeholder="Username" autocomplete="username"></div>
      <div><div class="flbl">Password</div><input class="finp" id="lpass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="lerr" id="lerr">Username ya password galat hai</div>
      <button class="lblogin" onclick="doLogin()">Login karein →</button>
    </div>

  </div>
</div>

<!-- ADMIN -->
<div class="sscr" id="adm-scr">
  <div class="sscr-hdr">
    <button class="sbk" onclick="closeScreen('adm-scr')">&#x2039;</button>
    <div class="hav">&#x1F4DA;</div>
    <div class="hinfo">
      <div class="hname" style="color:#fff">Admin Panel</div>
      <div style="font-size:11px;color:rgba(255,255,255,.8);" id="adm-sub">Knowledge Base</div>
    </div>
    <button class="hbtn" onclick="doLogout()">&#x1F6AA;</button>
  </div>
  <div id="tabs">
    <button class="tab on" id="tkb" onclick="switchTab('kb')"><div class="tabi">&#x1F4DA;</div>KB</button>
    <button class="tab" id="tadd" onclick="switchTab('add')"><div class="tabi">&#x2795;</div>Add</button>
    <button class="tab" id="tupd" onclick="switchTab('upd')"><div class="tabi">&#x1F4E2;</div>Updates</button>
    <button class="tab" id="tset" onclick="switchTab('set')"><div class="tabi">&#x2699;&#xFE0F;</div>Settings</button>
  </div>
  <div id="adm-body"></div>
</div>

<!-- MODAL -->
<div id="mbg" onclick="if(event.target===this)closeMod()">
  <div class="modal">
    <div class="mtit" id="mtit">Edit Entry</div>
    <div id="mbody"></div>
    <div class="mbtns">
      <button class="bcancel" onclick="closeMod()">Cancel</button>
      <button class="bsave" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
/* ── FACTORY KNOWLEDGE BASE ── */
const FKB=[
{id:'k01',q:'MMFSL kya hai company ka parichay',a:'Mahindra & Mahindra Financial Services Limited (MMFSL) India ki top NBFCs mein se ek hai — 32 saal se rural aur semi-urban India ki seva. 1 crore+ customers, 1,386+ branches, 4 lakh+ gaon mein reach. Mahindra Group ka hissa — wahi Mahindra jo tractor, Scorpio, Bolero banata hai. RBI registered, NSE/BSE listed — bilkul safe.',tags:['company','mmfsl'],pri:'high'},
{id:'k02',q:'MMFSL ke products services kya hain',a:'MMFSL mein sab milta hai: Car Loan (100% funding), Tractor Loan (harvest EMI), Commercial Vehicle Loan, Pre-Owned Vehicle Loan, Personal/Suvidha Loan, Home Loan (9.29% se), SME/Machinery Loan, Fixed Deposit (7.35% — Samruddhi & Dhanvruddhi), Mutual Funds, Insurance. Ek hi jagah sab kuch.',tags:['products','overview'],pri:'high'},
{id:'k03',q:'Car loan pitch features kaise karein',a:'Pitch: "Bhaiya, aaj gadi lo — ek paisa nahi chahiye, 100% MMFSL dega." Features: 100% ex-showroom funding, Maruti/Hyundai/Tata/Mahindra/Renault sab brands, 5 saal tenure, salaried/kisan/trader sab eligible, collateral nahi. Flat rate, clear EMI. Kuch working days mein approval.',tags:['car','loan','pitch'],pri:'high'},
{id:'k04',q:'Car loan documents eligibility kya chahiye',a:'Documents: Aadhaar, PAN, 2 photos, 6 mahine bank statement, income proof — kisan ke liye zameen ke kagaz (ITR zarori nahi). Collateral nahi. Field officer ghar aata hai. Approval kuch working days mein.',tags:['car','documents'],pri:'high'},
{id:'k05',q:'Tractor loan pitch kisan ko kaise samjhayein',a:'Problem: "Kiraye ke tractor mein fasal late hoti hai na?" Solution: "Apna tractor = sahi waqt + fasal zyada + kiraya zero." MMFSL tractor loan: 90% tak funding, 5 saal tenure, harvest EMI — pehle 6 mahine koi EMI nahi! 2 working days approval. Close: "Aaj kagaz do — parson tractor ghar."',tags:['tractor','kisan','pitch'],pri:'high'},
{id:'k06',q:'Tractor loan eligibility documents brands',a:'Koi bhi kisan eligible — 18-65 saal, kheti karta ho. Documents: Aadhaar, PAN, photos, 6 mahine passbook, zameen ke kagaz — ITR nahi chahiye. Brands: Mahindra, Sonalika, John Deere, TAFE, Eicher, New Holland sab. Doorstep service.',tags:['tractor','eligibility','documents'],pri:'high'},
{id:'k07',q:'Harvest EMI tractor kya hota hai',a:'MMFSL ka sabse bada advantage — Harvest EMI! Pehle 6 mahine koi EMI nahi, pehle fasal aao phir bhar do. Rabi ya Kharif — jis pe kisan depend kare. Yeh feature sirf MMFSL deta hai, banks nahi. Pitch mein hamesha use karo.',tags:['tractor','harvest','emi'],pri:'high'},
{id:'k08',q:'Commercial vehicle truck tempo bus loan',a:'Trucks, tempos, buses, vans sab. LTV 85% tak, 5 saal tenure. Khaas: 6 mahine ka route permit = income proof (ITR nahi chahiye). Pitch: "Apna truck = malik bano. Route permit hai? Bas wahi kaafi hai MMFSL ke liye."',tags:['commercial','truck'],pri:'medium'},
{id:'k09',q:'Purani gaadi second hand pre owned vehicle loan',a:'MMFSL purani/second-hand car pe bhi loan deta hai! Purani Maruti, Honda, Hyundai pe bhi. Pitch: "Budget mein purani Swift lo — EMI Rs.5,000 se. MMFSL loan dega." Pre-owned mein bhi doorstep service.',tags:['pre-owned','used','purani'],pri:'medium'},
{id:'k10',q:'Personal loan suvidha loan kya hai',a:'Personal loan Rs.50,000-15 lakh, digital, kuch ghante mein approve. Suvidha Loan: existing MMFSL customers ke liye pre-approved, vehicle asset pe secured, poori tarah online. Pehle se MMFSL customer? Seedha Suvidha offer karo. Helpline: 1800-233-1234.',tags:['personal','suvidha'],pri:'medium'},
{id:'k11',q:'Home loan ghar ke liye',a:'MMFSL home loan rural/semi-urban India ke liye — ghar banana ya khareedna. Rate 9.29% se shuru, minimal docs. Pitch: "Pucca ghar banana hai? MMFSL kar dega." Branch ya 1800-233-1234.',tags:['home','ghar'],pri:'medium'},
{id:'k12',q:'SME business loan machinery vyapaar dukaan',a:'SME options: Business Loan, Machinery Loan (naya/purana), Loan Against Property. Pitch: "Dukaan badhani hai? MMFSL 2 din mein decision — bank se fast, kam kagaz." 2 saal purana business, basic docs.',tags:['sme','business','machinery'],pri:'medium'},

/* ── GOOGLE APPS SCRIPT SYNC ── */
// Uses Google Apps Script as backend — free, no CORS issues, works on all phones
function getScriptUrl(){return localStorage.getItem('mf_gas_url')||'';}
function setScriptUrl(u){localStorage.setItem('mf_gas_url',u);}
function syncOk(){return !!getScriptUrl();}
function fullData(){return{kb:getKB(),upds:getUpds(),v:Date.now()};}
function applyData(d){if(d&&d.kb)setKB(d.kb);if(d&&d.upds)setUpds(d.upds);}

async function syncDown(){
  const lbl=document.getElementById('sync-lbl');
  const url=getScriptUrl();
  if(!url){lbl.textContent='Online · Mahindra Finance';return;}
  try{
    lbl.textContent='Syncing…';
    const r=await fetch(url+'?action=read',{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error('read fail');
    const d=await r.json();
    if(d&&d.kb){
      applyData(d);
      lbl.textContent='Online · Mahindra Finance';
    }else{
      lbl.textContent='Online · Mahindra Finance';
    }
  }catch(e){
    lbl.textContent='Online · Mahindra Finance';
  }
}

async function pushUp(){
  const url=getScriptUrl();
  if(!url)return false;
  try{
    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'write',data:fullData()}),
      signal:AbortSignal.timeout(10000)
    });
    return r.ok;
  }catch{return false;}
}

async function testAndSaveUrl(url){
  try{
    const r=await fetch(url+'?action=read',{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error('bad response');
    const d=await r.json();
    // Write initial data
    await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'write',data:fullData()}),
      signal:AbortSignal.timeout(10000)
    });
    setScriptUrl(url);
    return true;
  }catch(e){
    throw new Error('URL kaam nahi kar rahi. Steps dobara check karo.');
  }
}

/* ── ANSWER ENGINE ── */
function findAnswer(input){
  const lo=input.toLowerCase().trim();
  // 1. Updates first (admin pushed these — highest priority)
  for(const u of getUpds()){
    const words=lo.split(/\s+/).filter(w=>w.length>1);
    if(words.some(w=>u.title.toLowerCase().includes(w)||u.body.toLowerCase().includes(w)||(u.tags||[]).some(t=>t.toLowerCase().includes(w))))
      return{a:'📢 Nayi update: '+u.title+'\n\n'+u.body,t:u.tags||[]};
  }
  // 2. Patterns
  let best=null,bs=0;
  for(const p of PAT){let sc=0;for(const kw of p.kw){if(lo.includes(kw))sc+=kw.length*2;}if(sc>bs){bs=sc;best=p;}}
  if(best&&bs>2)return{a:best.a,t:best.t};
  // 3. KB entries
  const words=lo.split(/\s+/).filter(w=>w.length>1);
  let kb2=null,ks=0;
  for(const e of getKB()){
    let sc=0;
    for(const w of words){if(e.q.toLowerCase().includes(w))sc+=4;if(e.a.toLowerCase().includes(w))sc+=1;if((e.tags||[]).some(t=>t.toLowerCase().includes(w)))sc+=3;}
    if(e.pri==='high')sc*=1.4;
    if(sc>ks){ks=sc;kb2=e;}
  }
  if(kb2&&ks>2)return{a:kb2.a,t:kb2.tags||[]};
  // 4. Fallbacks
  const fb=['Thoda aur detail do — customer kya bol raha hai exactly? Pitch chahiye ya objection handle karna?','Yeh topic abhi database mein nahi. Admin panel se nayi entry add karo — sab ke phone mein instantly aayega!','Samjha nahi. Tractor loan, car loan, FD, SME, ya objection — seedha batao.'];
  return{a:fb[Math.floor(Math.random()*fb.length)],t:[]};
}

/* ── CHAT ── */
let _busy=false,_typ=null;
function doSend(){
  if(_busy)return;
  const el=document.getElementById('txta');
  const msg=el.value.trim();if(!msg)return;
  _busy=true;el.value='';el.style.height='';el.blur();
  addBubble(msg,'me');showTyping();
  setTimeout(()=>{hideTyping();const r=findAnswer(msg);addBubble(r.a,'bot',r.t);updateSugs(msg);_busy=false;},200+Math.random()*350);
}
function addBubble(text,who,tags=[]){
  const wrap=document.getElementById('msgs');
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  const row=document.createElement('div');row.className='row '+who;
  const tH=tags.length?`<div class="btgs">${tags.slice(0,3).map(t=>`<span class="btg">${t}</span>`).join('')}</div>`:'';
  const meta=`<div class="bmeta"><span class="bt">${now}</span></div>`;
  if(who==='me')row.innerHTML=`<div class="bbl me">${esc(text)}${meta}</div>`;
  else row.innerHTML=`<div class="bav">M</div><div class="bbl bot">${fmt(text)}${tH}${meta}</div>`;
  wrap.appendChild(row);
  requestAnimationFrame(()=>{wrap.scrollTop=wrap.scrollHeight;});
}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/✓/g,'<span style="color:#16a34a">✓</span>').replace(/\n/g,'<br>');}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTyping(){if(_typ)return;const w=document.getElementById('msgs');_typ=document.createElement('div');_typ.className='trow';_typ.innerHTML='<div class="bav">M</div><div class="tbbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';w.appendChild(_typ);requestAnimationFrame(()=>{w.scrollTop=w.scrollHeight;});}
function hideTyping(){if(_typ){_typ.remove();_typ=null;}}
function clearChat(){const w=document.getElementById('msgs');while(w.children.length>2)w.removeChild(w.lastChild);_busy=false;hideTyping();toast('Chat saaf ho gayi');setTimeout(()=>addBubble('Nayi baat shuru karte hain! Kuch bhi poochho. 💼','bot',[]),300);}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,92)+'px';}
function useSug(btn){if(_busy)return;document.getElementById('txta').value=btn.textContent;doSend();}
const SUGS={tractor:['Harvest EMI?','Tractor eligibility?','Kaunse brands?','Pitch again'],car:['100% funding?','Purani gaadi?','Documents?','EMI kitni?'],sme:['Machinery loan?','Process?','Eligibility?'],obj:['Bank compare','Trust objection','Budget objection','Deal close'],def:['MMFSL kya hai?','Tractor loan pitch','Rate objection','Documents?','Deal close karo']};
function updateSugs(msg){const lo=msg.toLowerCase();const bar=document.getElementById('sugs');let c=SUGS.def;if(lo.includes('tractor')||lo.includes('kisan'))c=SUGS.tractor;else if(lo.includes('car')||lo.includes('gaadi'))c=SUGS.car;else if(lo.includes('sme')||lo.includes('business'))c=SUGS.sme;else if(lo.includes('object')||lo.includes('byaj')||lo.includes('trust')||lo.includes('bank'))c=SUGS.obj;bar.innerHTML=c.map(x=>`<button class="sg" onclick="useSug(this)">${x}</button>`).join('');}

      <div class="kbl" id="kbl">${kbHTML(kb)}</div>
    </div>
    <div class="ver">v4.0 · mahindrafinance.com · JSONBin sync</div>`;
  }else if(t==='add'){
    const tl=tags.map(tg=>`<span onclick="addTag('${tg}')" style="color:#C0001D;cursor:pointer;text-decoration:underline;margin-right:4px;font-size:11px;">${tg}</span>`).join('');
    body.innerHTML=`
    <div class="card"><div class="ctit">Nayi Entry Add Karo</div>
    <div class="aform">
      <div><div class="flbl">Question *</div><input class="ainp" id="nq" placeholder="e.g. Gold loan features kya hain?"></div>
      <div><div class="flbl">Jawab *</div><textarea class="atxt" id="na" placeholder="Hindi mein…"></textarea></div>
      <div><div class="flbl">Tags</div><input class="ainp" id="nt" placeholder="loan, gold">${tl?`<div style="margin-top:4px;line-height:1.9;">${tl}</div>`:''}</div>
      <div><div class="flbl">Priority</div>
        <div class="prirow" id="prirow">
          <button class="pribtn" onclick="setPri('low',this)">Low</button>
          <button class="pribtn on" onclick="setPri('medium',this)">Medium</button>
          <button class="pribtn" onclick="setPri('high',this)">High</button>
        </div></div>
      <button class="bsub" id="add-btn" onclick="addEntry()">+ Add &amp; Sync to All Phones</button>
    </div></div>`;
    _pri='medium';
  }else if(t==='upd'){
    const ul=upds.length?`<div class="card"><div class="ctit">Posted Updates <span class="cbdg">${upds.length}</span></div>
      <div class="kbl">${upds.slice().reverse().map(u=>`<div class="ki">
        <div class="kq">📢 ${u.title}</div><div class="ka">${u.body}</div>
        <div class="ktgs">${(u.tags||[]).map(tg=>`<span class="ktg">${tg}</span>`).join('')}</div>
        <div style="font-size:10px;color:#bbb;margin-top:3px;">${new Date(u.ts).toLocaleString('en-IN')}</div>
        <div class="kact"><button class="bdel" onclick="delUpd('${u.id}')">Delete &amp; Sync</button></div>
      </div>`).join('')}</div></div>`:'<div class="empty">Koi updates nahi hain abhi</div>';
    body.innerHTML=`
    <div class="card"><div class="ctit">Daily Update Post Karo</div>
    <div style="font-size:12px;color:#666;margin-bottom:10px;line-height:1.6;">Yahan jo bhi post karo — <strong>sab ke phone mein instantly aayega</strong> (cloud ON hone pe). Koi file bhejne ki zaroorat nahi.</div>
    <div class="aform">
      <div><div class="flbl">Title *</div><input class="ainp" id="ut" placeholder="e.g. Naya tractor discount scheme launch hua"></div>
      <div><div class="flbl">Details *</div><textarea class="atxt" id="ub" placeholder="Rate, eligibility, last date — poori jaankari…"></textarea></div>
      <div><div class="flbl">Tags</div><input class="ainp" id="utg" placeholder="tractor, scheme, discount"></div>
      <button class="bsub" id="upd-btn" onclick="addUpd()">📢 Post &amp; Sync to All Phones</button>
    </div></div>${ul}`;
  }else if(t==='set'){
    const gasUrl=getScriptUrl();
    const ok=!!gasUrl;
    const codeSample='function doGet(e){var p=PropertiesService.getScriptProperties();var d=p.getProperty(\'data\');return ContentService.createTextOutput(d||\'{}\').setMimeType(ContentService.MimeType.JSON);}\nfunction doPost(e){try{var b=JSON.parse(e.postData.contents);if(b.action===\'write\'){PropertiesService.getScriptProperties().setProperty(\'data\',JSON.stringify(b.data));return ContentService.createTextOutput(\'ok\').setMimeType(ContentService.MimeType.TEXT);}return ContentService.createTextOutput(\'unknown\').setMimeType(ContentService.MimeType.TEXT);}catch(err){return ContentService.createTextOutput(\'error\').setMimeType(ContentService.MimeType.TEXT);}}';
    body.innerHTML=`
    ${ok
      ?`<div class="info-box info-green"><strong>✅ Cloud Sync Active!</strong> Aap jo bhi change karo — sab ke phone pe 30 second mein aa jaata hai.</div>`
      :`<div class="info-box info-red"><strong>⚠️ Sync Setup Nahi Hua</strong> Neeche 5-min setup karo — free hai, ek hi baar karna hai.</div>`}
    <div class="card"><div class="ctit">🔗 Google Script Setup</div>
    <div class="info-box info-blue" style="margin-bottom:12px;font-size:12px;line-height:1.9;">
      <strong style="font-size:13px;">5 minute mein ho jaayega — free forever:</strong>
      <ol style="margin-left:14px;margin-top:6px;">
        <li>Jao <a href="https://script.google.com" target="_blank"><strong>script.google.com</strong></a> → <strong>New Project</strong></li>
        <li>Jo code dikhega usse <strong>poora select karke delete</strong> karo</li>
        <li>Neeche wala code copy karke <strong>paste</strong> karo</li>
        <li>Upar <strong>Save</strong> (💾) karo</li>
        <li><strong>Deploy → New deployment</strong> click karo</li>
        <li>Type: <strong>Web app</strong> select karo</li>
        <li>Execute as: <strong>Me</strong> | Who has access: <strong>Anyone</strong></li>
        <li><strong>Deploy</strong> → permission maange toh <strong>Allow</strong> karo</li>
        <li>Jo URL mile woh copy karke neeche paste karo</li>
      </ol>
    </div>
    <div style="background:#1e1e1e;border-radius:8px;padding:10px;margin-bottom:12px;font-family:monospace;font-size:10.5px;color:#9cdcfe;word-break:break-all;line-height:1.6;overflow-x:auto;white-space:pre-wrap;">${codeSample}</div>
    <div class="aform">
      <div>
        <div class="flbl">Deployment URL (neeche paste karo)</div>
        <input class="ainp" id="gasurl" value="${gasUrl}" placeholder="https://script.google.com/macros/s/…/exec">
      </div>
      <button class="bsub" id="conn-btn" onclick="doConnect()">${ok?'Update Connection':'▶ Connect &amp; Activate Sync'}</button>
    </div></div>
    <div class="card"><div class="ctit">👤 Password Change Karo</div>
    <div class="aform">
      <div><div class="flbl">New Username</div><input class="ainp" id="nuu" value="${cfg.user}"></div>
      <div><div class="flbl">New Password</div><input class="ainp" id="nup" type="password" placeholder="New password"></div>
      <button class="bsub bgray" onclick="saveCreds()">Update Credentials</button>
    </div></div>
    <div class="ver">MMFSL Assistant v4.0 · Google Script Sync · Free</div>`;
  }
}
function kbHTML(kb){if(!kb.length)return'<div class="empty">No entries</div>';return kb.map(e=>`<div class="ki" id="ki_${e.id}"><div class="kq">${e.q}</div><div class="ka">${(e.a||'').substring(0,90)}…</div><div class="ktgs">${(e.tags||[]).map(t=>`<span class="ktg">${t}</span>`).join('')}</div><div class="kact"><button class="bedit" onclick="openEdit('${e.id}')">✏️ Edit</button><button class="bdel" onclick="delEntry('${e.id}')">🗑️ Delete</button></div></div>`).join('');}
function filterKB(q){const lo=q.toLowerCase();const f=getKB().filter(e=>e.q.toLowerCase().includes(lo)||e.a.toLowerCase().includes(lo)||(e.tags||[]).join(' ').includes(lo));document.getElementById('kbl').innerHTML=kbHTML(f);}
function setPri(v,btn){_pri=v;document.querySelectorAll('.prirow .pribtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function addTag(t){const el=document.getElementById('nt');if(!el)return;const c=el.value.split(',').map(x=>x.trim()).filter(Boolean);if(!c.includes(t))el.value=[...c,t].join(', ');}

async function doConnect(){
  const url=document.getElementById('gasurl')?.value.trim();
  if(!url){toast('URL paste karo pehle');return;}
  const btn=document.getElementById('conn-btn');
  btn.textContent='Testing…';btn.disabled=true;
  try{
    await testAndSaveUrl(url);
    toast('✅ Connected! Sab phones pe sync hoga ab.');
    refreshAdmSub();renderTab('set');
  }catch(e){
    toast('❌ '+e.message);
    btn.textContent='▶ Connect & Activate Sync';btn.disabled=false;
  }
}


async function addEntry(){
  const q=document.getElementById('nq').value.trim();const a=document.getElementById('na').value.trim();
  if(!q||!a){toast('Question aur Answer dono fill karo');return;}
  const tags=document.getElementById('nt').value.split(',').map(x=>x.trim()).filter(Boolean);
  const kb=getKB();kb.push({id:'k'+Date.now(),q,a,tags,pri:_pri||'medium',ts:Date.now()});setKB(kb);
  const btn=document.getElementById('add-btn');btn.textContent='Syncing…';btn.disabled=true;
  const ok=await pushUp();btn.textContent='+ Add & Sync to All Phones';btn.disabled=false;
  toast(ok?'✅ Added & synced to all phones!':'✅ Added (sync offline — will sync when connected)');
  switchTab('kb');
}
async function delEntry(id){setKB(getKB().filter(e=>e.id!==id));document.getElementById('ki_'+id)?.remove();const ok=await pushUp();toast(ok?'Deleted & synced!':'Deleted locally');renderTab('kb');}
function openEdit(id){const e=getKB().find(x=>x.id===id);if(!e)return;_eid=id;document.getElementById('mtit').textContent='Edit Entry';document.getElementById('mbody').innerHTML=`<div class="aform"><div><div class="flbl">Question</div><input class="ainp" id="eq" value="${e.q.replace(/"/g,'&quot;')}"></div><div><div class="flbl">Answer</div><textarea class="atxt" id="ea">${e.a}</textarea></div><div><div class="flbl">Tags</div><input class="ainp" id="et" value="${(e.tags||[]).join(', ')}"></div><div><div class="flbl">Priority</div><div class="prirow">${['low','medium','high'].map(p=>`<button class="pribtn${e.pri===p?' on':''}" onclick="setPri('${p}',this)">${p[0].toUpperCase()+p.slice(1)}</button>`).join('')}</div></div></div>`;_pri=e.pri;document.getElementById('mbg').classList.add('open');}
async function saveEdit(){const kb=getKB();const i=kb.findIndex(e=>e.id===_eid);if(i<0)return;kb[i].q=document.getElementById('eq').value.trim();kb[i].a=document.getElementById('ea').value.trim();kb[i].tags=document.getElementById('et').value.split(',').map(t=>t.trim()).filter(Boolean);kb[i].pri=_pri||kb[i].pri;setKB(kb);closeMod();const ok=await pushUp();toast(ok?'✅ Saved & synced to all phones!':'Saved (sync offline)');renderTab('kb');}
function closeMod(){document.getElementById('mbg').classList.remove('open');}
async function addUpd(){const title=document.getElementById('ut').value.trim();const body=document.getElementById('ub').value.trim();if(!title||!body){toast('Title aur Details fill karo');return;}const tags=document.getElementById('utg').value.split(',').map(t=>t.trim()).filter(Boolean);const upds=getUpds();upds.push({id:'u'+Date.now(),title,body,tags,ts:Date.now()});setUpds(upds);const btn=document.getElementById('upd-btn');btn.textContent='Syncing…';btn.disabled=true;const ok=await pushUp();btn.textContent='📢 Post & Sync to All Phones';btn.disabled=false;toast(ok?'📢 Posted & synced to all phones!':'Posted (sync offline)');renderTab('upd');}
async function delUpd(id){setUpds(getUpds().filter(u=>u.id!==id));const ok=await pushUp();toast(ok?'Deleted & synced!':'Deleted locally');renderTab('upd');}
function saveCreds(){const u=document.getElementById('nuu').value.trim();const p=document.getElementById('nup').value;if(!u){toast('Username required');return;}const c=getCfg();c.user=u;if(p)c.pass=p;saveCfg(c);toast('✅ Credentials updated!');}
function toggleEye(btn,id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁️':'🙈';}

/* ── VOICE ── */
let _rec=null,_ron=false;
function toggleMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice aapke browser mein nahi');return;}const btn=document.getElementById('micbtn');if(_ron){_rec?.stop();return;}_rec=new SR();_rec.lang='hi-IN';_rec.interimResults=false;_rec.onresult=e=>{document.getElementById('txta').value=e.results[0][0].transcript;grow(document.getElementById('txta'));};_rec.onerror=_rec.onend=()=>{_ron=false;btn.classList.remove('rec');};_rec.start();_ron=true;btn.classList.add('rec');}

/* ── TOAST ── */
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600);}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',async()=>{
  const d=new Date();
  const days=['Ravivar','Somvar','Mangalvar','Budhvar','Guruvar','Shukravar','Shanivar'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dlbl').textContent=`${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
  await syncDown();
  setTimeout(()=>addBubble('Namaste! 🙏 Main aapka MMFSL Sales Assistant hoon.\n\nTractor loan, car loan, FD, objections — sab Hindi mein. Poochho kuch bhi!','bot',[]),500);
  if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>{document.getElementById('shell').style.height=window.visualViewport.height+'px';});}
  setInterval(syncDown,30*1000);
});
</script>
</body>
